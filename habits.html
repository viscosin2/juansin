<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Huerto">
<meta name="theme-color" content="#f3f1e7">
<title>Huerto</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#f3f1e7;
  --surface:rgba(255,253,244,0.86);
  --surface2:rgba(232,239,221,0.72);
  --border:rgba(126,142,104,0.24);
  --text:#35412d;
  --text-muted:#718066;
  --text-dim:#b2bea5;

  --green1:#e8f1dc;
  --green2:#ccdfb6;
  --green3:#8bb76a;
  --green4:#4f8430;
  --green5:#2f5b20;

  --brown1:#efe3ce;
  --brown2:#c5a575;
  --brown3:#76593a;

  --accent:#4f8430;
  --water:#82bcc8;
  --water-light:#e3f3f2;

  --radius:24px;
  --danger:#c85b4b;
  --morning:#e9bd73;
  --afternoon:#dc8d69;
  --night:#7886bd;

  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
}

html,
body{
  width:100%;
  height:100%;
  overflow:hidden;
  background:var(--bg);
}

body{
  font-family:'DM Sans',sans-serif;
  background:
    radial-gradient(circle at 20% 8%, rgba(255,255,255,0.72), transparent 28%),
    radial-gradient(circle at 80% 18%, rgba(198,221,177,0.36), transparent 34%),
    radial-gradient(circle at 50% 90%, rgba(198,168,120,0.20), transparent 40%),
    var(--bg);
  color:var(--text);
  user-select:none;
  position:fixed;
  inset:0;
}

.app{
  position:fixed;
  inset:0;
  display:flex;
  flex-direction:column;
  height:100svh;
  overflow:hidden;
  background:
    linear-gradient(180deg, rgba(255,255,255,0.34), rgba(243,241,231,0.86)),
    var(--bg);
}

/* TOP BAR */
.topbar{
  padding:calc(var(--safe-top) + 18px) 20px 14px;
  background:rgba(243,241,231,0.78);
  backdrop-filter:blur(14px);
  display:flex;
  align-items:center;
  justify-content:space-between;
  border-bottom:1px solid rgba(126,142,104,0.18);
  position:sticky;
  top:0;
  z-index:10;
}

.topbar-title{
  font-family:'Lora',serif;
  font-size:24px;
  font-weight:600;
  color:var(--text);
  letter-spacing:-0.3px;
}

.topbar-title span{
  color:var(--green4);
}

.streak-badge{
  font-size:13px;
  color:var(--green5);
  background:rgba(232,241,220,0.76);
  padding:4px 10px;
  border-radius:20px;
  font-weight:500;
  display:inline-block;
  margin-top:5px;
  border:1px solid rgba(126,142,104,0.14);
}

/* SCROLL */
.scroll-area{
  flex:1;
  overflow-y:auto;
  padding:16px 18px calc(28px + env(safe-area-inset-bottom,0px));
  -webkit-overflow-scrolling:touch;
}

.scroll-area::-webkit-scrollbar{
  display:none;
}

.screen{
  display:none;
}

.screen.active{
  display:block;
}

/* GARDEN HEADER */
.garden-row-head{
  display:flex;
  justify-content:space-between;
  align-items:flex-end;
  margin:2px 2px 8px;
}

.garden-row-head div:first-child{
  font-family:'Lora',serif;
  font-size:15px;
  font-style:italic;
  color:rgba(63,112,38,0.66);
}

.garden-row-head div:last-child{
  font-size:13px;
  font-weight:500;
  color:var(--green5);
  background:rgba(232,241,220,0.72);
  padding:4px 10px;
  border-radius:20px;
  border:1px solid rgba(126,142,104,0.14);
}

/* GARDEN VISUALIZATION */
.garden-wrap{
  background:#dfe8c8;
  border-radius:30px;
  padding:16px;
  margin-bottom:18px;
  position:relative;
  overflow:hidden;
  min-height:180px;
  border:1.5px solid rgba(95,132,70,0.12);
  box-shadow:none;
}

.garden-sky{
  position:absolute;
  top:0;
  left:0;
  right:0;
  height:50%;
  background:
    radial-gradient(circle at 26% 22%, rgba(255,255,255,0.82), transparent 22%),
    radial-gradient(circle at 72% 10%, rgba(255,244,198,0.38), transparent 18%),
    linear-gradient(180deg, #c9e5e5 0%, #dce9c8 100%);
  border-radius:30px 30px 0 0;
}

.garden-ground{
  position:absolute;
  bottom:0;
  left:0;
  right:0;
  height:50%;
  background:
    radial-gradient(circle at 18% 58%, rgba(255,255,255,0.18), transparent 18%),
    radial-gradient(circle at 70% 72%, rgba(138,104,62,0.16), transparent 22%),
    linear-gradient(180deg, #ead7b5 0%, #d3b284 100%);
}

.garden-grass{
  position:absolute;
  bottom:50%;
  left:0;
  right:0;
  height:24px;
  background:
    linear-gradient(90deg, rgba(255,255,255,0.22), transparent 20%, rgba(255,255,255,0.16), transparent 70%),
    linear-gradient(180deg, #8fbd69 0%, #547f35 100%);
  filter:blur(0.15px);
}

.garden-sky,
.garden-ground,
.garden-grass{
  pointer-events:none;
}

.garden-content{
  position:relative;
  z-index:3;
  display:flex;
  align-items:flex-end;
  justify-content:center;
  gap:14px;
  min-height:148px;
  padding-bottom:8px;
  flex-wrap:wrap;
  pointer-events:auto;
}

/* PLANTS */
.plant{
  display:flex;
  flex-direction:column;
  align-items:center;
  cursor:pointer;
  transition:transform 0.3s;
  min-width:42px;
  position:relative;
  z-index:4;
  pointer-events:auto;
  overflow:visible;
}
.plant:active{
  transform:scale(0.95);
}

.plant-svg{
  transition:all 0.6s ease;
  position:relative;
  z-index:2;
  filter:drop-shadow(0 7px 7px rgba(48,72,34,0.20));
}

/* WATER ANIMATION */
@keyframes waterDrop{
  0%{
    opacity:1;
    transform:translateY(-12px) scale(1);
  }
  100%{
    opacity:0;
    transform:translateY(34px) scale(0.5);
  }
}

.water-drop{
  position:absolute;
  font-size:16px;
  pointer-events:none;
  animation:waterDrop 0.8s ease-out forwards;
  z-index:20;
}

.floating-menu-btn{
  position:fixed;
  right:18px;
  bottom:calc(28px + env(safe-area-inset-bottom,0px));
  width:56px;
  height:56px;
  border-radius:50%;
  border:1.5px solid rgba(63,116,40,0.5);
  background:linear-gradient(180deg, #5f9440, #3f7428);
  box-shadow:0 12px 30px rgba(63,112,38,0.26);
  z-index:500;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:5px;
  cursor:pointer;
  -webkit-appearance:none;
}

.floating-menu-btn span{
  width:20px;
  height:2px;
  border-radius:2px;
  background:#fff;
}

.menu-overlay{
  position:fixed;
  inset:0;
  background:rgba(60,80,45,0.22);
  z-index:300;
  display:none;
  align-items:flex-end;
  justify-content:flex-end;
  padding:0 18px calc(88px + env(safe-area-inset-bottom,0px)) 18px;
  backdrop-filter:blur(4px);
}

.menu-overlay.open{
  display:flex;
}

.menu-panel{
  width:220px;
  background:var(--surface);
  backdrop-filter:blur(12px);
  border:1.5px solid rgba(126,142,104,0.22);
  border-radius:24px;
  padding:8px;
  box-shadow:0 12px 40px rgba(60,80,45,0.18);
}

.menu-panel button{
  width:100%;
  border:none;
  background:transparent;
  color:var(--text);
  font-family:'DM Sans',sans-serif;
  font-size:16px;
  text-align:left;
  padding:14px 14px;
  border-radius:16px;
  cursor:pointer;
  -webkit-appearance:none;
}

.menu-panel button:active{
  background:rgba(232,239,221,0.72);
}

/* SECTION */
.section-label{
  font-size:11px;
  font-weight:600;
  letter-spacing:0.07em;
  text-transform:uppercase;
  color:var(--text-muted);
  margin:14px 0 10px;
  font-family:'DM Sans',sans-serif;
}

.empty-msg{
  color:var(--text-muted);
  font-size:14px;
  padding:20px 0;
  text-align:center;
  font-family:'Lora',serif;
  font-style:italic;
}

/* HABIT CARD */
.habit-card{
  background:var(--surface);
  backdrop-filter:blur(12px);
  border:1.5px solid rgba(126,142,104,0.22);
  border-radius:var(--radius);
  padding:14px;
  margin-bottom:10px;
  display:flex;
  align-items:center;
  gap:12px;
  transition:opacity 0.3s, transform 0.2s;
  box-shadow:0 10px 28px rgba(81,99,63,0.08);
}

.habit-card.done{
  opacity:0.58;
}

.habit-card.done .habit-name{
  text-decoration:line-through;
  color:var(--text-muted);
}

.habit-emoji{
  width:44px;
  height:44px;
  border-radius:15px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:22px;
  flex-shrink:0;
  background:rgba(232,239,221,0.66);
  box-shadow:inset 0 0 14px rgba(255,255,255,0.34);
}

.habit-info{
  flex:1;
  min-width:0;
}

.habit-name{
  font-size:15px;
  font-weight:500;
  margin-bottom:4px;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.habit-meta{
  display:flex;
  align-items:center;
  gap:6px;
  flex-wrap:wrap;
}

.time-badge{
  font-size:10px;
  font-weight:600;
  padding:2px 8px;
  border-radius:20px;
}

.badge-morning{
  background:rgba(233,189,115,0.22);
  color:#966323;
}

.badge-afternoon{
  background:rgba(220,141,105,0.22);
  color:#984e34;
}

.badge-night{
  background:rgba(120,134,189,0.22);
  color:#4a589a;
}

.habit-prog{
  font-size:11px;
  color:var(--text-muted);
}

.habit-prog.full{
  color:var(--green4);
  font-weight:600;
}

/* CHECK BUTTON */
.check-btn{
  width:38px;
  height:38px;
  border-radius:50%;
  border:2px solid rgba(126,142,104,0.34);
  background:none;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-shrink:0;
  color:transparent;
  -webkit-appearance:none;
  transition:all 0.25s;
}

.check-btn.checked{
  background:linear-gradient(180deg, #5f9440, #3f7428);
  border-color:rgba(63,116,40,0.8);
  color:#fff;
}

.check-btn svg{
  width:16px;
  height:16px;
}

/* HABITS LIST */
.habit-list-item{
  background:var(--surface);
  backdrop-filter:blur(12px);
  border:1.5px solid rgba(126,142,104,0.22);
  border-radius:var(--radius);
  padding:14px 16px;
  margin-bottom:10px;
  display:flex;
  align-items:center;
  gap:12px;
  box-shadow:0 10px 28px rgba(81,99,63,0.08);
}

.hi-emoji{
  font-size:22px;
  width:36px;
  text-align:center;
  flex-shrink:0;
}

.hi-info{
  flex:1;
}

.hi-name{
  font-size:15px;
  font-weight:500;
}

.hi-freq{
  font-size:12px;
  color:var(--text-muted);
  margin-top:3px;
  display:flex;
  align-items:center;
  gap:6px;
  flex-wrap:wrap;
}

.hi-actions{
  display:flex;
  gap:8px;
}

.icon-btn{
  width:34px;
  height:34px;
  border-radius:11px;
  border:1.5px solid rgba(126,142,104,0.24);
  background:rgba(232,239,221,0.66);
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  color:var(--text-muted);
  -webkit-appearance:none;
}

.icon-btn.del{
  border-color:rgba(200,91,75,0.25);
  color:var(--danger);
}

.icon-btn svg{
  width:14px;
  height:14px;
}

/* MODAL */
.modal-overlay{
  position:fixed;
  inset:0;
  background:rgba(60,80,45,0.35);
  z-index:100;
  display:none;
  align-items:flex-end;
  backdrop-filter:blur(4px);
}

.modal-overlay.open{
  display:flex;
}

.modal{
  background:var(--surface);
  backdrop-filter:blur(18px);
  border-radius:30px 30px 0 0;
  width:100%;
  max-height:92dvh;
  overflow-y:auto;
  padding:24px 22px calc(env(safe-area-inset-bottom,0px) + 34px);
  transform:translateY(100%);
  transition:transform 0.28s ease;
  border:1px solid rgba(126,142,104,0.18);
  box-shadow:0 -18px 40px rgba(60,80,45,0.18);
}

.modal-overlay.open .modal{
  transform:translateY(0);
}

.modal::-webkit-scrollbar{
  display:none;
}

.modal-title-row{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-bottom:20px;
}

.modal-title{
  font-family:'Lora',serif;
  font-size:22px;
  font-weight:600;
  color:var(--text);
}

.modal-close{
  width:34px;
  height:34px;
  border-radius:50%;
  border:1.5px solid rgba(126,142,104,0.24);
  background:rgba(232,239,221,0.66);
  color:var(--text-muted);
  font-size:20px;
  line-height:1;
  cursor:pointer;
}

.field{
  margin-bottom:16px;
}

.field label{
  display:block;
  font-size:11px;
  font-weight:600;
  letter-spacing:0.07em;
  text-transform:uppercase;
  color:var(--text-muted);
  margin-bottom:8px;
}

.input{
  width:100%;
  background:rgba(232,239,221,0.66);
  border:1.5px solid rgba(126,142,104,0.24);
  border-radius:16px;
  color:var(--text);
  font-family:'DM Sans',sans-serif;
  font-size:16px;
  padding:12px 14px;
  outline:none;
  -webkit-appearance:none;
}

.input:focus{
  border-color:rgba(79,132,48,0.55);
}

.emoji-trigger{
  width:100%;
  background:rgba(232,239,221,0.66);
  border:1.5px solid rgba(126,142,104,0.24);
  border-radius:16px;
  padding:12px 14px;
  display:flex;
  align-items:center;
  gap:10px;
  cursor:pointer;
}

.emoji-trigger .big{
  font-size:26px;
}

.emoji-trigger.compact{
  height:56px;
  padding:0;
  justify-content:center;
}

.emoji-trigger.compact .big{
  font-size:28px;
}

.habit-main-row{
  display:grid;
  grid-template-columns:64px 1fr;
  gap:12px;
  align-items:center;
  margin-bottom:18px;
}

.pill-group{
  display:flex;
  gap:6px;
  flex-wrap:wrap;
}

.pill{
  padding:7px 14px;
  border-radius:20px;
  border:1.5px solid rgba(126,142,104,0.24);
  background:rgba(232,239,221,0.66);
  color:var(--text-muted);
  font-size:13px;
  font-weight:500;
  cursor:pointer;
  -webkit-appearance:none;
}

.pill.selected{
  background:linear-gradient(180deg, #5f9440, #3f7428);
  border-color:rgba(63,116,40,0.8);
  color:#fff;
}

.days-grid{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:6px;
}

.day-btn{
  aspect-ratio:1;
  border-radius:12px;
  border:1.5px solid rgba(126,142,104,0.24);
  background:rgba(232,239,221,0.66);
  color:var(--text-muted);
  font-size:11px;
  font-weight:600;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  -webkit-appearance:none;
}

.day-btn.selected{
  background:linear-gradient(180deg, #5f9440, #3f7428);
  border-color:rgba(63,116,40,0.8);
  color:#fff;
}

.times-row{
  display:flex;
  align-items:center;
  gap:16px;
}

.num-btn{
  width:40px;
  height:40px;
  border-radius:50%;
  border:1.5px solid rgba(126,142,104,0.24);
  background:rgba(232,239,221,0.66);
  color:var(--text);
  font-size:20px;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  -webkit-appearance:none;
}

.num-btn:active{
  background:var(--green3);
  color:#fff;
}

.num-display{
  font-size:26px;
  font-weight:700;
  min-width:40px;
  text-align:center;
}

.toggle-row{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:4px 0;
}

.toggle{
  position:relative;
  width:46px;
  height:28px;
  background:rgba(232,239,221,0.66);
  border-radius:14px;
  cursor:pointer;
  border:1.5px solid rgba(126,142,104,0.24);
  flex-shrink:0;
}

.toggle.on{
  background:linear-gradient(180deg, #5f9440, #3f7428);
  border-color:rgba(63,116,40,0.8);
}

.toggle::after{
  content:'';
  position:absolute;
  width:22px;
  height:22px;
  background:white;
  border-radius:50%;
  top:2px;
  left:2px;
  transition:transform 0.2s;
  box-shadow:0 2px 8px rgba(0,0,0,0.12);
}

.toggle.on::after{
  transform:translateX(18px);
}

.btn-primary{
  width:100%;
  padding:15px;
  border-radius:17px;
  background:linear-gradient(180deg, #5f9440, #3f7428);
  color:#fff;
  font-family:'DM Sans',sans-serif;
  font-size:15px;
  font-weight:500;
  border:none;
  cursor:pointer;
  margin-top:10px;
  -webkit-appearance:none;
  transition:background 0.2s;
  box-shadow:0 10px 20px rgba(63,112,38,0.16);
}

.btn-primary:active{
  background:var(--green5);
}

.btn-danger{
  width:100%;
  padding:15px;
  border-radius:17px;
  background:rgba(200,91,75,0.08);
  color:var(--danger);
  font-family:'DM Sans',sans-serif;
  font-size:15px;
  font-weight:500;
  border:1.5px solid rgba(200,91,75,0.2);
  cursor:pointer;
  margin-top:8px;
  -webkit-appearance:none;
}

.btn-secondary{
  width:100%;
  padding:15px;
  border-radius:17px;
  background:rgba(232,239,221,0.66);
  color:var(--text-muted);
  font-family:'DM Sans',sans-serif;
  font-size:15px;
  font-weight:500;
  border:1.5px solid rgba(126,142,104,0.24);
  cursor:pointer;
  margin-top:6px;
  -webkit-appearance:none;
}

/* EMOJI POPUP */
.emoji-popup{
  position:fixed;
  inset:0;
  background:rgba(60,80,45,0.35);
  z-index:200;
  display:none;
  align-items:flex-end;
  backdrop-filter:blur(4px);
}

.emoji-popup.open{
  display:flex;
}

.emoji-inner{
  background:var(--surface);
  backdrop-filter:blur(18px);
  border-radius:30px 30px 0 0;
  width:100%;
  height:72dvh;
  overflow:hidden;
  padding:30px 14px calc(env(safe-area-inset-bottom,0px) + 34px);
  display:flex;
  flex-direction:column;
  border:1px solid rgba(126,142,104,0.18);
}

.emoji-search{
  width:100%;
  flex-shrink:0;
  background:rgba(232,239,221,0.66);
  border:1.5px solid rgba(126,142,104,0.24);
  border-radius:16px;
  color:var(--text);
  font-family:'DM Sans',sans-serif;
  font-size:16px;
  padding:12px 14px;
  outline:none;
  margin-bottom:12px;
  -webkit-appearance:none;
}

.emoji-grid{
  flex:1;
  overflow-y:auto;
  display:grid;
  grid-template-columns:repeat(8,1fr);
  gap:2px;
  padding-bottom:60px;
  -webkit-overflow-scrolling:touch;
}

.emoji-grid::-webkit-scrollbar{
  display:none;
}

.emoji-opt{
  font-size:26px;
  padding:6px;
  background:none;
  border:none;
  cursor:pointer;
  border-radius:10px;
  -webkit-appearance:none;
}

.emoji-opt:active{
  background:rgba(232,239,221,0.66);
}

/* STATS */
.month-selector{
  display:flex;
  align-items:center;

let habits=[];
let logs={};

let eId=null;
let wt=3;
let emoji='🌿';
let freq='daily';
let slot='anytime';
let notifOn=false;
let days=[];

let statsMon=new Date(new Date().getFullYear(),new Date().getMonth(),1);
let statsFilt=null;
let currentScreen='today';

const load=()=>{
  habits=JSON.parse(localStorage.getItem('hv5') || '[]');
  logs=JSON.parse(localStorage.getItem('lv5') || '{}');
};

const save=()=>{
  localStorage.setItem('hv5',JSON.stringify(habits));
  localStorage.setItem('lv5',JSON.stringify(logs));
};

const today=()=>dk(new Date());

const dk=(d)=>`${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}`;

const p=(n)=>String(n).padStart(2,'0');

const dow=(d)=>(d.getDay()+6)%7;

const weekStart=(date)=>{
  const d=new Date(date);
  const dy=d.getDay();
  d.setDate(d.getDate()-dy+(dy===0?-6:1));
  d.setHours(0,0,0,0);
  return d;
};

const weekKey=(date)=>{
  const ws=weekStart(date);
  return dk(ws);
};

const weekCount=(id,date=new Date())=>{
  const ws=weekStart(date);
  let n=0;

  for(let i=0;i<7;i++){
    const d=new Date(ws);
    d.setDate(d.getDate()+i);
    const k=dk(d);
    if(logs[k] && logs[k][id]) n+=logs[k][id];
  }

  return n;
};

const todayCount=(id)=>{
  const t=today();
  return (logs[t] && logs[t][id]) || 0;
};

const doneToday=(h,date=new Date())=>{
  const k=dk(date);
  return !!(logs[k] && logs[k][h.id] >= 1);
};

const doneCount=(h)=>{
  if(h.freq==='weekly') return weekCount(h.id);
  return todayCount(h.id);
};

const target=(h)=>{
  if(h.freq==='weekly') return h.weeklyTimes;
  return 1;
};

const complete=(h)=>{
  if(h.freq==='weekly') return weekCount(h.id) >= h.weeklyTimes;
  return todayCount(h.id) >= 1;
};

const dueOnDate=(h,date)=>{
  const d=dow(date);

  if(h.freq==='daily') return true;
  if(h.freq==='days') return h.days.includes(d);
  if(h.freq==='weekly') return true;

  return true;
};

const dueToday=(h)=>{
  const now=new Date();

  if(h.freq==='daily') return true;
  if(h.freq==='days') return h.days.includes(dow(now));

  if(h.freq==='weekly'){
    if(doneToday(h)) return true;
    return weekCount(h.id) < h.weeklyTimes;
  }

  return true;
};

const canMarkToday=(h)=>{
  if(h.freq==='weekly'){
    return !doneToday(h) && weekCount(h.id) < h.weeklyTimes;
  }

  return !doneToday(h);
};

function todayPct(){
  const due=habits.filter(h=>dueToday(h));

  if(!due.length) return 0;

  const done=due.filter(h=>{
    if(h.freq==='weekly') return doneToday(h) || weekCount(h.id) >= h.weeklyTimes;
    return complete(h);
  }).length;

  return Math.round((done/due.length)*100);
}

function habitStreak(h){
  if(h.freq==='weekly'){
    return weeklyHabitStreak(h);
  }

  let s=0;
  const d=new Date();

  for(let i=0;i<365;i++){
    const k=dk(d);
    const due=dueOnDate(h,d);

    if(due && logs[k] && (logs[k][h.id] || 0) >= 1){
      s++;
    }else if(due && k!==today()){
      break;
    }

    d.setDate(d.getDate()-1);
  }

  return s;
}

function weeklyHabitStreak(h){
  let s=0;
  const d=new Date();

  for(let w=0;w<80;w++){
    const count=weekCount(h.id,d);

    if(count >= h.weeklyTimes){
      s++;
    }else if(w>0){
      break;
    }

    d.setDate(d.getDate()-7);
  }

  return s;
}

function habitStage(h){
  const streak=habitStreak(h);

  if(streak>=30) return 4;
  if(streak>=14) return 3;
  if(streak>=7) return 2;
  if(streak>=2) return 1;

  return 0;
}

function renderGarden(){
  const pct=todayPct();

  document.getElementById('gardenPct').textContent=pct + '%';

  const labels=[
    'Tu huertito',
    'Creciendo poco a poco',
    'Floreciendo',
    '¡Precioso huerto!',
    'Huerto de ensueño...'
  ];

  const idx=pct===100 ? 4 : pct>75 ? 3 : pct>50 ? 2 : pct>25 ? 1 : 0;
  document.getElementById('gardenLabel').textContent=labels[idx];

  const content=document.getElementById('gardenContent');

  if(!habits.length){
    content.innerHTML=`<div style="text-align:center;padding:20px 0;color:rgba(60,80,40,0.5);font-family:'Lora',serif;font-style:italic;font-size:13px;z-index:2;position:relative;">Añade tu primer hábito<br>para plantar una semilla</div>`;
    return;
  }

  const due=habits.filter(h=>dueToday(h));
  const show=due.length ? due : habits.slice(0,8);

  content.innerHTML=show.map(h=>{
    const isDoneToday=doneToday(h);
    const isComplete=complete(h);
    const stage=(isDoneToday || isComplete) ? habitStage(h)+1 : habitStage(h);
    const clamped=Math.min(stage,4);
    const size=44+clamped*8;

    return `<div class="plant" onclick="toggle('${h.id}')" title="${h.name}">
      <div class="plant-svg" id="psv_${h.id}">${plantSVG(clamped,h.color,size)}</div>
    </div>`;
  }).join('');
}

function showWaterDrops(plantEl){
  const wrap=document.getElementById('gardenWrap');
  if(!wrap || !plantEl)return;

  const plantRect=plantEl.getBoundingClientRect();
  const wrapRect=wrap.getBoundingClientRect();

  const baseLeft=plantRect.left - wrapRect.left + plantRect.width / 2;
  const baseTop=plantRect.top - wrapRect.top + 8;

  for(let i=0;i<5;i++){
    setTimeout(()=>{
      const drop=document.createElement('div');
      drop.className='water-drop';
      drop.textContent='💧';

      drop.style.left=(baseLeft + Math.random()*26 - 13) + 'px';
      drop.style.top=(baseTop + Math.random()*8 - 4) + 'px';

      wrap.appendChild(drop);

      setTimeout(()=>drop.remove(),900);
    },i*110);
  }
}

function showScreen(name){
  closeAllModals();
  currentScreen=name;

  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));

  const ids={
    today:'screenToday',
    habits:'screenHabits',
    stats:'screenStats'
  };

  if(ids[name]){
    document.getElementById(ids[name]).classList.add('active');
  }

  if(name==='today'){
    renderToday();
    renderGarden();
  }else if(name==='habits'){
    renderHabits();
  }else{
    renderStats();
  }
}

function openMenu(){
  closeAllModals();

  const panel=document.getElementById('menuPanel');
  if(!panel)return;

  let items=[];

  if(currentScreen!=='today'){
    items.push(`<button onclick="showScreen('today');closeMenu()">Hoy</button>`);
  }

  items.push(`<button onclick="closeMenu();openHabitModal(null)">Nuevo hábito</button>`);

  if(currentScreen!=='habits'){
    items.push(`<button onclick="showScreen('habits');closeMenu()">Mis hábitos</button>`);
  }

  if(currentScreen!=='stats'){
    items.push(`<button onclick="showScreen('stats');closeMenu()">Estadísticas</button>`);
  }

  items.push(`<button onclick="closeMenu();openNotifModal()">Notificaciones</button>`);

  panel.innerHTML=items.join('');

  document.getElementById('menuOverlay').classList.add('open');
}

function closeMenu(){
  document.getElementById('menuOverlay').classList.remove('open');
}

function closeAllModals(){
  document.getElementById('modalHabit').classList.remove('open');
  document.getElementById('modalNotif').classList.remove('open');
  document.getElementById('emojiPopup').classList.remove('open');
}

const TORD={
  morning:1,
  afternoon:2,
  night:3,
  custom:4,
  anytime:5
};

function renderToday(){
  const all=habits
    .filter(h=>dueToday(h))
    .sort((a,b)=>(TORD[a.slot] || 5) - (TORD[b.slot] || 5));

  const pend=all.filter(h=>{
    if(h.freq==='weekly'){
      return !doneToday(h) && weekCount(h.id) < h.weeklyTimes;
    }

    return !complete(h);
  });

  const done=all.filter(h=>{
    if(h.freq==='weekly'){
      return doneToday(h);
    }

    return complete(h);
  });

  const pEl=document.getElementById('listPending');
  const dEl=document.getElementById('listDone');
  const dSec=document.getElementById('doneSection');

  pEl.innerHTML=pend.length
    ? pend.map(h=>cardHTML(h,false)).join('')
    : `<p class="empty-msg">No hay hábitos pendientes</p>`;

  dSec.style.display='block';

  dEl.innerHTML=done.length
    ? done.map(h=>cardHTML(h,true)).join('')
    : `<p class="empty-msg">Hoy todavía no se ha completado ningún hábito</p>`;
}

function badgeHTML(h){
  if(h.slot==='morning') return '<span class="time-badge badge-morning">Mañana</span>';
  if(h.slot==='afternoon') return '<span class="time-badge badge-afternoon">Tarde</span>';
  if(h.slot==='night') return '<span class="time-badge badge-night">Noche</span>';

  if(h.slot==='custom'){
    return `<span class="time-badge" style="background:var(--brown1);color:var(--brown3)">${h.customTime || ''}</span>`;
  }

  return '';
}

function cardHTML(h,done){
  const dc=doneCount(h);
  const tg=target(h);

  const prog=tg>1
    ? `<span class="habit-prog${dc>=tg ? ' full' : ''}">${dc}/${tg}</span>`
    : '';

  const streak=habitStreak(h);

  const streakBadge=streak>1
    ? `<span style="font-size:10px;color:var(--green4)">🌸${streak}</span>`
    : '';

  return `<div class="habit-card${done ? ' done' : ''}">
    <div class="habit-emoji" style="background:${h.color}22">${h.emoji}</div>
    <div class="habit-info">
      <div class="habit-name">${h.name}</div>
      <div class="habit-meta">${badgeHTML(h)}${prog}${streakBadge}</div>
    </div>
    <button class="check-btn${done ? ' checked' : ''}" onclick="toggle('${h.id}')" style="${done ? 'background:'+h.color+';border-color:'+h.color : ''}">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
        <polyline points="20 6 9 17 4 12"/>
      </svg>
    </button>
  </div>`;
}

function toggle(id){
  const h=habits.find(x=>x.id===id);
  if(!h) return;

  const t=today();

  if(!logs[t]) logs[t]={};

  if(h.freq==='weekly'){
    if(doneToday(h)){
      logs[t][id]=0;
      delete logs[t][id];
    }else{
      if(weekCount(h.id) >= h.weeklyTimes){
        return;
      }

      logs[t][id]=1;

      const plantEl=document.getElementById('psv_'+id);
      if(plantEl) showWaterDrops(plantEl);
    }
  }else{
    if(doneToday(h)){
      logs[t][id]=0;
      delete logs[t][id];
    }else{
      logs[t][id]=1;

      const plantEl=document.getElementById('psv_'+id);
      if(plantEl) showWaterDrops(plantEl);
    }
  }

  if(Object.keys(logs[t]).length===0) delete logs[t];

  save();
  renderToday();
  renderGarden();
  updateStreak();
}

function renderHabits(){
  const el=document.getElementById('habitsList');

  if(!habits.length){
    el.innerHTML='<p class="empty-msg">todavía no hay ningún hábito 🌱<br>¡planta el primero!</p>';
    return;
  }

  el.innerHTML=habits.map(h=>`
    <div class="habit-list-item">
      <div class="hi-emoji">${h.emoji}</div>
      <div class="hi-info">
        <div class="hi-name">${h.name}</div>
        <div class="hi-freq">${freqText(h)} ${badgeHTML(h)}</div>
      </div>
      <div class="hi-actions">
        <button class="icon-btn" onclick="openHabitModal('${h.id}')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
            <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
          </svg>
        </button>
        <button class="icon-btn del" onclick="delHabit('${h.id}')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="3 6 5 6 21 6"/>
            <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
            <path d="M10 11v6"/>
            <path d="M14 11v6"/>
          </svg>
        </button>
      </div>
    </div>
  `).join('');
}

const freqText=(h)=>{
  if(h.freq==='daily') return 'Diario';
  if(h.freq==='weekly') return `${h.weeklyTimes}×/sem`;
  return h.days.map(d=>DAYS[d]).join(', ');
};

function openHabitModal(id){
  eId=null;
  wt=3;
  emoji='🌿';
  freq='daily';
  slot='anytime';
  notifOn=false;
  days=[];

  document.getElementById('habitName').value='';
  document.getElementById('customTime').value='08:00';
  document.getElementById('notifTime').value='08:00';
  document.getElementById('notifToggle').classList.remove('on');
  document.getElementById('btnDelete').style.display='none';

  document.getElementById('fWeekly').style.display='none';
  document.getElementById('fDays').style.display='none';
  document.getElementById('fCustomTime').style.display='none';
  document.getElementById('fNotifTime').style.display='none';

  if(id){
    const h=habits.find(x=>x.id===id);
    if(!h) return;

    eId=id;
    emoji=h.emoji;
    freq=h.freq;
    slot=h.slot || 'anytime';
    wt=h.weeklyTimes || 3;
    days=h.days ? [...h.days] : [];
    notifOn=h.notifOn || false;

    document.getElementById('habitName').value=h.name;
    document.getElementById('customTime').value=h.customTime || '08:00';
    document.getElementById('notifTime').value=h.notifTime || '08:00';

    if(notifOn){
      document.getElementById('notifToggle').classList.add('on');
      document.getElementById('fNotifTime').style.display='block';
    }

    document.getElementById('btnDelete').style.display='block';
    document.getElementById('modalTitle').textContent='Editar hábito';
  }else{
    document.getElementById('modalTitle').textContent='Nuevo hábito';
  }

  document.getElementById('emojiDisplay').textContent=emoji;
  document.getElementById('wtDisplay').textContent=wt;

  syncFreq();
  syncSlot();
  updateFreqUI();
  updateSlotUI();

  document.getElementById('modalHabit').classList.add('open');
}

function syncFreq(){
  const pills=document.querySelectorAll('#freqPills .pill');
  ['daily','weekly','days'].forEach((f,i)=>pills[i].classList.toggle('selected',f===freq));
}

function syncSlot(){
  const pills=document.querySelectorAll('#timePills .pill');
  ['anytime','morning','afternoon','night','custom'].forEach((s,i)=>pills[i].classList.toggle('selected',s===slot));
}

function setFreq(f){
  freq=f;
  syncFreq();
  updateFreqUI();
}

function updateFreqUI(){
  document.getElementById('fWeekly').style.display=freq==='weekly' ? 'block' : 'none';
  document.getElementById('fDays').style.display=freq==='days' ? 'block' : 'none';
  document.getElementById('wtDisplay').textContent=wt;

  if(freq==='days') buildDays();
}

function buildDays(){
  document.getElementById('daysGrid').innerHTML=DAYS.map((d,i)=>`
    <button class="day-btn${days.includes(i) ? ' selected' : ''}" onclick="toggleDay(${i})">${d}</button>
  `).join('');
}

function toggleDay(i){
  const idx=days.indexOf(i);

  if(idx>=0) days.splice(idx,1);
  else days.push(i);

  buildDays();
}

function changeWT(d){
  wt=Math.max(1,Math.min(7,wt+d));
  document.getElementById('wtDisplay').textContent=wt;
}

function setSlot(s){
  slot=s;
  syncSlot();
  updateSlotUI();
}

function updateSlotUI(){
  document.getElementById('fCustomTime').style.display=slot==='custom' ? 'block' : 'none';
}

function toggleNotif(){
  notifOn=!notifOn;
  document.getElementById('notifToggle').classList.toggle('on',notifOn);
  document.getElementById('fNotifTime').style.display=notifOn ? 'block' : 'none';
}

function saveHabit(){
  const name=document.getElementById('habitName').value.trim();

  if(!name){
    toast('Ponle un nombre al hábito');
    return;
  }

  if(freq==='days' && !days.length){
    toast('Elige al menos un día');
    return;
  }

  const h={
    id:eId || `h${Date.now()}`,
    name,
    emoji,
    freq,
    weeklyTimes:wt,
    days:[...days],
    slot,
    customTime:document.getElementById('customTime').value,
    notifOn,
    notifTime:document.getElementById('notifTime').value,
    color:COLORS[habits.length % COLORS.length]
  };

  if(eId){
    const i=habits.findIndex(x=>x.id===eId);
    h.color=habits[i].color;
    habits[i]=h;
  }else{
    habits.push(h);
  }

  save();
  closeModal('modalHabit');

  renderToday();
  renderGarden();
  renderHabits();
  updateStreak();
}

function deleteEditing(){
  if(!eId) return;

  habits=habits.filter(h=>h.id!==eId);

  Object.keys(logs).forEach(k=>{
    if(logs[k] && logs[k][eId]){
      delete logs[k][eId];
      if(Object.keys(logs[k]).length===0) delete logs[k];
    }
  });

  save();
  closeModal('modalHabit');

  toast('🍂 Eliminado');

  renderToday();
  renderGarden();
  renderHabits();
  updateStreak();
}

function delHabit(id){
  const h=habits.find(x=>x.id===id);
  if(!h) return;

  if(confirm(`¿Eliminar "${h.name}"?`)){
    habits=habits.filter(x=>x.id!==id);

    Object.keys(logs).forEach(k=>{
      if(logs[k] && logs[k][id]){
        delete logs[k][id];
        if(Object.keys(logs[k]).length===0) delete logs[k];
      }
    });

    save();

    renderHabits();
    renderToday();
    renderGarden();
    updateStreak();

    toast('🍂 Eliminado');
  }
}

function openEmojiPopup(){
  document.getElementById('emojiSearch').value='';
  buildEmojiGrid(EMOJIS);
  document.getElementById('emojiPopup').classList.add('open');
}

function filterEmoji(q){
  buildEmojiGrid(q ? EMOJIS.filter(e=>e.includes(q)) : EMOJIS);
}

function buildEmojiGrid(list){
  document.getElementById('emojiGrid').innerHTML=list.map(e=>`
    <button class="emoji-opt" onclick="pickEmoji('${e}')">${e}</button>
  `).join('');
}

function pickEmoji(e){
  emoji=e;
  document.getElementById('emojiDisplay').textContent=e;
  document.getElementById('emojiPopup').classList.remove('open');
}

function openNotifModal(){
  const wn=habits.filter(h=>h.notifOn);

  document.getElementById('notifList').innerHTML=wn.length
    ? wn.map(h=>`
      <div class="habit-list-item">
        <div class="hi-emoji">${h.emoji}</div>
        <div class="hi-info">
          <div class="hi-name">${h.name}</div>
          <div class="hi-freq">🔔 ${h.notifTime}</div>
        </div>
      </div>
    `).join('')
    : '<p class="empty-msg" style="text-align:center;padding:20px 0">Ningún hábito con notificaciones.</p>';

  document.getElementById('modalNotif').classList.add('open');
}

function changeMonth(d){
  statsMon=new Date(statsMon.getFullYear(),statsMon.getMonth()+d,1);

  const now=new Date();

  document.getElementById('btnNextMonth').style.opacity=
    (statsMon.getFullYear()===now.getFullYear() && statsMon.getMonth()===now.getMonth())
    ? '0.3'
    : '1';

  renderStats();
}

function renderStats(){
  const M=[
    'Enero','Febrero','Marzo','Abril','Mayo','Junio',
    'Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'
  ];

  document.getElementById('statsMonthName').textContent=`${M[statsMon.getMonth()]} ${statsMon.getFullYear()}`;

  const vis=statsFilt ? habits.filter(h=>h.id===statsFilt) : habits;
  const dim=new Date(statsMon.getFullYear(),statsMon.getMonth()+1,0).getDate();

  let tot=0;

  for(let d=1;d<=dim;d++){
    const k=dk(new Date(statsMon.getFullYear(),statsMon.getMonth(),d));

    if(!logs[k]) continue;

    vis.forEach(h=>{
      if(logs[k][h.id]) tot+=logs[k][h.id];
    });
  }

  document.getElementById('statsGrid').innerHTML=`
    <div class="stat-box">
      <div class="stat-val">${tot}</div>
      <div class="stat-lbl">Riegos este mes 💧</div>
    </div>
    <div class="stat-box">
      <div class="stat-val">${calcStreak()}</div>
      <div class="stat-lbl">Racha actual 🌸</div>
    </div>
  `;

  document.getElementById('statsFilter').innerHTML=
    `<div class="filter-chip${statsFilt===null ? ' active' : ''}" onclick="setFilt(null)">Todos</div>`+
    habits.map(h=>`
      <div class="filter-chip${statsFilt===h.id ? ' active' : ''}" onclick="setFilt('${h.id}')">${h.emoji} ${h.name}</div>
    `).join('');

  renderCal(vis);
}

function setFilt(id){
  statsFilt=id;
  renderStats();
}

function renderCal(vis){
  const fd=new Date(statsMon.getFullYear(),statsMon.getMonth(),1);
  const dim=new Date(statsMon.getFullYear(),statsMon.getMonth()+1,0).getDate();
  const sd=dow(fd);
  const todayStr=today();

  let h=DAYS.map(d=>`<div class="cal-header">${d}</div>`).join('');

  for(let i=0;i<sd;i++){
    h+=`<div class="cal-day other"></div>`;
  }

  for(let d=1;d<=dim;d++){
    const k=dk(new Date(statsMon.getFullYear(),statsMon.getMonth(),d));
    const isT=k===todayStr;
    const dl=logs[k] || {};

    const dots=vis
      .filter(x=>dl[x.id]>=1)
      .map(x=>`<div class="dot" style="background:${x.color}"></div>`)
      .join('');

    h+=`<div class="cal-day${isT ? ' today' : ''}">
      <span>${d}</span>
      ${dots ? `<div class="cal-dots">${dots}</div>` : ''}
    </div>`;
  }

  document.getElementById('statsCal').innerHTML=h;
}

function calcStreak(){
  let s=0;
  const d=new Date();

  for(let i=0;i<365;i++){
    const k=dk(d);

    const due=habits.filter(h=>{
      if(h.freq==='weekly') return false;
      return dueOnDate(h,d);
    });

    if(!due.length){
      d.setDate(d.getDate()-1);
      continue;
    }

    const allDone=due.every(h=>logs[k] && (logs[k][h.id] || 0) >= 1);

    if(allDone){
      s++;
    }else if(k!==today()){
      break;
    }

    d.setDate(d.getDate()-1);
  }

  return s;
}

function closeModal(id){
  document.getElementById(id).classList.remove('open');
}

let toastT;

function toast(msg){
  const t=document.getElementById('toast');

  t.textContent=msg;
  t.classList.add('show');

  clearTimeout(toastT);

  toastT=setTimeout(()=>t.classList.remove('show'),2500);
}

function updateStreak(){
  const s=calcStreak();
  document.getElementById('streakBadge').textContent=`🌸 ${s} días`;
}

function dismissInstall(){
  const banner=document.getElementById('installBanner');
  if(banner) banner.classList.remove('show');
  localStorage.setItem('installDismissed2','1');
}

function checkInstall(){
  const banner=document.getElementById('installBanner');
  if(!banner) return;

  const iOS=/iphone|ipad|ipod/.test(navigator.userAgent.toLowerCase());
  const standalone=window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;

  if(iOS && !standalone && !localStorage.getItem('installDismissed2')){
    banner.classList.add('show');
  }
}

document.getElementById('modalHabit').addEventListener('click',function(e){
  if(e.target===this) closeModal('modalHabit');
});

document.getElementById('modalNotif').addEventListener('click',function(e){
  if(e.target===this) closeModal('modalNotif');
});

document.getElementById('emojiPopup').addEventListener('click',function(e){
  if(e.target===this) this.classList.remove('open');
});

document.getElementById('menuOverlay').addEventListener('click',function(e){
  if(e.target===this) closeMenu();
});

load();
checkInstall();
updateStreak();
showScreen('today');
</script>
