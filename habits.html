<style>
:root {
  --bg: #0a0a0a;
  --surface: #141414;
  --surface2: #1e1e1e;
  --border: #2a2a2a;
  --text: #f0ede8;
  --text-muted: #6b6b6b;
  --text-dim: #3d3d3d;
  --accent: #c8f060;
  --radius: 16px;
  --danger: #ff4757;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --morning: #7ec8e3;
  --afternoon: #f4a261;
  --night: #4a6fa5;
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body {   font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background:var(--bg); color:var(--text); min-height:100dvh; overflow-x:hidden; user-select:none; }
.app { display:flex; flex-direction:column; height:100dvh; }

/* TOP BAR */
.topbar {
  padding: calc(var(--safe-top) + 14px) 20px 10px;
  background: var(--bg);
  display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid var(--border);
  position: sticky; top: 0; z-index: 10;
}
.topbar-title { font-size: 15px; font-weight: 600; letter-spacing: 0.04em; color: var(--text-muted); text-transform: uppercase; }
.streak-badge { font-size: 13px; color: var(--text-muted); }

.scroll-area { flex:1; overflow-y:auto; padding:12px 20px 120px; }
.scroll-area::-webkit-scrollbar { display:none; }

/* NAV */
.nav {
  position:fixed; bottom:0; left:0; right:0;
  background:var(--surface); border-top:1px solid var(--border);
  display:flex; align-items:center;
  padding:10px 8px calc(var(--safe-bottom) + 10px); gap:4px;
}
.nav-btn { flex:1; display:flex; flex-direction:column; align-items:center; gap:4px; padding:8px 4px; border:none; background:none; color:var(--text-muted); font-family:'DM Sans',sans-serif; font-size:10px; font-weight:500; cursor:pointer; border-radius:12px; }
.nav-btn.active { color:var(--accent); }
.nav-btn svg { width:22px; height:22px; }
.nav-add { width:52px; height:52px; border-radius:50%; background:var(--accent); border:none; display:flex; align-items:center; justify-content:center; cursor:pointer; flex-shrink:0; box-shadow:0 4px 20px rgba(200,240,96,0.3); transition:transform 0.15s; }
.nav-add:active { transform:scale(0.92); }
.nav-add svg { width:24px; height:24px; color:#0a0a0a; }

/* SCREENS */
.screen { display:none; }
.screen.active { display:block; }

/* SECTION LABEL */
.section-label { font-size:11px; font-weight:600; letter-spacing:0.08em; text-transform:uppercase; color:var(--text-muted); margin:16px 0 10px; }

/* EMPTY */
.empty-msg { color:var(--text-muted); font-size:14px; padding:20px 0 0; }

/* HABIT CARD */
.habit-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:16px; margin-bottom:10px; display:flex; align-items:center; gap:14px; }
.habit-card.done { opacity:0.5; }
.habit-card.done .habit-name { text-decoration:line-through; color:var(--text-muted); }
.habit-emoji { width:40px; height:40px; border-radius:12px; display:flex; align-items:center; justify-content:center; font-size:20px; flex-shrink:0; background:var(--surface2); }
.habit-info { flex:1; min-width:0; }
.habit-name { font-size:15px; font-weight:500; margin-bottom:4px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.habit-meta { display:flex; align-items:center; gap:6px; }
.time-badge { font-size:10px; font-weight:600; padding:2px 8px; border-radius:20px; }
.badge-morning { background:rgba(126,200,227,0.15); color:var(--morning); }
.badge-afternoon { background:rgba(244,162,97,0.15); color:var(--afternoon); }
.badge-night { background:rgba(74,111,165,0.2); color:var(--night); }
.habit-prog { font-size:11px; color:var(--text-muted); }
.habit-prog.full { color:var(--accent); }
.check-btn { width:36px; height:36px; border-radius:50%; border:2px solid var(--border); background:none; cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; color:transparent; transition:all 0.2s; }
.check-btn:active { transform:scale(0.88); }
.check-btn.checked { background:var(--accent); border-color:var(--accent); color:#0a0a0a; }
.check-btn svg { width:16px; height:16px; }

/* HABITS LIST */
.habit-list-item { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:14px 16px; margin-bottom:10px; display:flex; align-items:center; gap:12px; }
.hi-emoji { font-size:22px; width:36px; text-align:center; flex-shrink:0; }
.hi-info { flex:1; }
.hi-name { font-size:15px; font-weight:500; }
.hi-freq { font-size:12px; color:var(--text-muted); margin-top:3px; display:flex; align-items:center; gap:6px; }
.hi-actions { display:flex; gap:8px; }
.icon-btn { width:32px; height:32px; border-radius:8px; border:1px solid var(--border); background:var(--surface2); display:flex; align-items:center; justify-content:center; cursor:pointer; color:var(--text-muted); }
.icon-btn.del { border-color:rgba(255,71,87,0.2); color:var(--danger); }
.icon-btn svg { width:14px; height:14px; }

/* MODAL */
.modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.8); z-index:100; display:none; align-items:flex-end; backdrop-filter:blur(4px); }
.modal-overlay.open { display:flex; }
.modal { background:var(--surface); border-radius:24px 24px 0 0; width:100%; max-height:92dvh; overflow-y:auto; padding:8px 20px calc(var(--safe-bottom) + 24px); animation:slideUp 0.3s ease; }
.modal::-webkit-scrollbar { display:none; }
@keyframes slideUp { from { transform:translateY(100%); } to { transform:translateY(0); } }
.modal-handle { width:36px; height:4px; background:var(--border); border-radius:2px; margin:8px auto 20px; }
.modal-title { font-family:-apple-system,BlinkMacSystemFont,system-ui,sans-serif; font-size:22px; font-weight:700; margin-bottom:24px; }

/* FORM */
.field { margin-bottom:18px; }
.field label { display:block; font-size:11px; font-weight:600; letter-spacing:0.08em; text-transform:uppercase; color:var(--text-muted); margin-bottom:8px; }
.input { width:100%; background:var(--surface2); border:1px solid var(--border); border-radius:12px; color:var(--text); font-family:'DM Sans',sans-serif; font-size:15px; padding:12px 14px; outline:none; transition:border-color 0.2s; -webkit-appearance:none; }
.input:focus { border-color:var(--accent); }

/* EMOJI PICKER */
.emoji-picker-wrap { position:relative; }
.emoji-trigger { width:100%; background:var(--surface2); border:1px solid var(--border); border-radius:12px; padding:12px 14px; display:flex; align-items:center; gap:10px; cursor:pointer; font-size:24px; }
.emoji-trigger span { font-size:14px; color:var(--text-muted); }
.emoji-picker-popup { display:none; position:fixed; inset:0; z-index:200; background:rgba(0,0,0,0.7); align-items:flex-end; }
.emoji-picker-popup.open { display:flex; }
.emoji-picker-inner { background:var(--surface); border-radius:24px 24px 0 0; width:100%; max-height:70dvh; overflow-y:auto; padding:16px 16px calc(var(--safe-bottom)+16px); }
.emoji-picker-inner::-webkit-scrollbar { display:none; }
.emoji-search { width:100%; background:var(--surface2); border:1px solid var(--border); border-radius:12px; color:var(--text); font-family:'DM Sans',sans-serif; font-size:15px; padding:10px 14px; outline:none; margin-bottom:12px; -webkit-appearance:none; }
.emoji-grid { display:grid; grid-template-columns:repeat(8,1fr); gap:4px; }
.emoji-opt { aspect-ratio:1; border-radius:10px; font-size:26px; display:flex; align-items:center; justify-content:center; cursor:pointer; background:none; }
.emoji-opt:active { background:var(--surface2); }

.pill-group { display:flex; gap:6px; flex-wrap:wrap; }
.pill { padding:7px 14px; border-radius:20px; border:1px solid var(--border); background:var(--surface2); color:var(--text-muted); font-size:13px; font-weight:500; cursor:pointer; }
.pill.selected { background:var(--accent); border-color:var(--accent); color:#0a0a0a; }
.days-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:6px; }
.day-btn { aspect-ratio:1; border-radius:10px; border:1px solid var(--border); background:var(--surface2); color:var(--text-muted); font-size:11px; font-weight:600; cursor:pointer; display:flex; align-items:center; justify-content:center; }
.day-btn.selected { background:var(--accent); border-color:var(--accent); color:#0a0a0a; }
.times-per-week { display:flex; align-items:center; gap:12px; }
.num-btn { width:36px; height:36px; border-radius:50%; border:1px solid var(--border); background:var(--surface2); color:var(--text); font-size:18px; cursor:pointer; display:flex; align-items:center; justify-content:center; }
.num-btn:active { background:var(--accent); color:#0a0a0a; }
.num-display { font-size:24px; font-weight:600; min-width:36px; text-align:center; }
.toggle-row { display:flex; align-items:center; justify-content:space-between; padding:4px 0; }
.toggle-label { font-size:14px; }
.toggle { position:relative; width:44px; height:26px; background:var(--surface2); border-radius:13px; cursor:pointer; border:1px solid var(--border); }
.toggle.on { background:var(--accent); border-color:var(--accent); }
.toggle::after { content:''; position:absolute; width:20px; height:20px; background:white; border-radius:50%; top:2px; left:2px; transition:transform 0.2s; }
.toggle.on::after { transform:translateX(18px); }
.btn-primary { width:100%; padding:15px; border-radius:14px; background:var(--accent); color:#0a0a0a; font-family:'DM Sans',sans-serif; font-size:15px; font-weight:600; border:none; cursor:pointer; margin-top:8px; }
.btn-primary:active { opacity:0.85; }
.btn-danger { width:100%; padding:15px; border-radius:14px; background:rgba(255,71,87,0.1); color:var(--danger); font-family:'DM Sans',sans-serif; font-size:15px; font-weight:600; border:1px solid rgba(255,71,87,0.2); cursor:pointer; margin-top:8px; }

/* STATS */
.month-selector { display:flex; align-items:center; justify-content:space-between; margin-bottom:20px; }
.month-name { font-family:-apple-system,BlinkMacSystemFont,system-ui,sans-serif; font-size:22px; font-weight:700; }
.month-nav { width:32px; height:32px; border-radius:8px; border:1px solid var(--border); background:var(--surface2); display:flex; align-items:center; justify-content:center; cursor:pointer; color:var(--text-muted); }
.month-nav svg { width:16px; height:16px; }
.stats-summary { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:20px; }
.stat-box { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:16px; }
.stat-val { font-family:-apple-system,BlinkMacSystemFont,system-ui,sans-serif; font-size:32px; font-weight:700; color:var(--accent); }
.stat-lbl { font-size:11px; color:var(--text-muted); margin-top:4px; }
.stat-habit-filter { display:flex; gap:6px; overflow-x:auto; padding-bottom:8px; margin-bottom:16px; }
.stat-habit-filter::-webkit-scrollbar { display:none; }
.filter-chip { padding:6px 12px; border-radius:20px; white-space:nowrap; border:1px solid var(--border); background:var(--surface2); font-size:12px; font-weight:500; color:var(--text-muted); cursor:pointer; }
.filter-chip.active { background:var(--accent); border-color:var(--accent); color:#0a0a0a; }
.cal-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:4px; }
.cal-day-header { font-size:10px; font-weight:600; color:var(--text-dim); text-align:center; padding:4px 0; }
.cal-day { aspect-ratio:1; border-radius:8px; background:var(--surface2); display:flex; align-items:center; justify-content:center; font-size:11px; color:var(--text-muted); flex-direction:column; gap:2px; position:relative; }
.cal-day.other-month { opacity:0.2; }
.cal-day.today { border:1px solid var(--accent); color:var(--accent); }
.cal-day-dots { display:flex; gap:2px; flex-wrap:wrap; justify-content:center; max-width:20px; }
.dot { width:5px; height:5px; border-radius:50%; }

/* INSTALL */
.install-banner { background:linear-gradient(135deg,rgba(200,240,96,0.08),rgba(200,240,96,0.03)); border:1px solid rgba(200,240,96,0.2); border-radius:var(--radius); padding:14px 16px; margin-bottom:16px; display:none; align-items:center; gap:12px; }
.install-banner.show { display:flex; }
.install-banner p { flex:1; font-size:13px; color:var(--text-muted); line-height:1.4; }
.install-banner strong { color:var(--text); }
.install-banner button { padding:8px 14px; background:var(--accent); color:#0a0a0a; border:none; border-radius:8px; font-family:'DM Sans',sans-serif; font-size:12px; font-weight:600; cursor:pointer; }

/* TOAST */
.toast { position:fixed; bottom:90px; left:50%; transform:translateX(-50%) translateY(20px); background:var(--surface); border:1px solid var(--border); padding:10px 18px; border-radius:20px; font-size:13px; font-weight:500; white-space:nowrap; opacity:0; transition:all 0.3s; z-index:300; pointer-events:none; }
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
</style>

</head>

// ─── DATE ───
function today() { const d = new Date(); return dateKey(d); }
function dateKey(d) { return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
function jsDayToMon(d) { return (d.getDay()+6)%7; }

function getWeekStart(date) {
  const d = new Date(date); const day = d.getDay();
  const diff = d.getDate() - day + (day===0?-6:1);
  d.setDate(diff); d.setHours(0,0,0,0); return d;
}
function getWeeklyCount(hid) {
  const ws = getWeekStart(new Date()); let count = 0;
  for (let i=0;i<7;i++) { const d=new Date(ws); d.setDate(d.getDate()+i); const k=dateKey(d); if(logs[k]&&logs[k][hid]) count+=logs[k][hid]; }
  return count;
}
function getTodayCount(hid) { const t=today(); return (logs[t]&&logs[t][hid])||0; }
function getDoneCount(h) { return h.freq==='weekly'?getWeeklyCount(h.id):getTodayCount(h.id); }
function getTarget(h) { return h.freq==='weekly'?h.weeklyTimes:1; }
function isComplete(h) { return getDoneCount(h)>=getTarget(h); }

function isDueToday(h) {
  if (h.freq==='daily') return true;
  if (h.freq==='days') return h.days.includes(jsDayToMon(new Date()));
  if (h.freq==='weekly') return getDoneCount(h)<h.weeklyTimes;
  return true;
}

// ─── SCREENS ───
function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  const map = {today:['screenToday','navToday'],habits:['screenHabits','navHabits'],stats:['screenStats','navStats']};
  if (!map[name]) return;
  document.getElementById(map[name][0]).classList.add('active');
  document.getElementById(map[name][1]).classList.add('active');
  if (name==='today') renderToday();
  else if (name==='habits') renderHabitsList();
  else renderStats();
}

// ─── TODAY ───
const TIME_ORDER = {morning:1,afternoon:2,night:3,custom:4,anytime:5};
function sortedHabits() {
  return habits.filter(h=>isDueToday(h)).sort((a,b)=>{
    const ao=TIME_ORDER[a.timeSlot]||5, bo=TIME_ORDER[b.timeSlot]||5;
    if(ao!==bo) return ao-bo;
    if(a.timeSlot==='custom'&&b.timeSlot==='custom') return (a.customTime||'').localeCompare(b.customTime||'');
    return 0;
  });
}

function renderToday() {
  const all = sortedHabits();
  const pending = all.filter(h=>!isComplete(h));
  const done = all.filter(h=>isComplete(h));
  const pEl = document.getElementById('listPending');
  const dEl = document.getElementById('listDone');
  pEl.innerHTML = pending.length ? pending.map(h=>cardHTML(h,false)).join('') : '<p class="empty-msg">Todavía no hay ningún hábito creado 🌱</p>';
  dEl.innerHTML = done.length ? done.map(h=>cardHTML(h,true)).join('') : '<p class="empty-msg">Todavía no hay ningún hábito creado 🌱</p>';
}

function timeBadgeHTML(h) {
  const map = {
    morning:`<span class="time-badge badge-morning">Mañana</span>`,
    afternoon:`<span class="time-badge badge-afternoon">Tarde</span>`,
    night:`<span class="time-badge badge-night">Noche</span>`,
    custom:`<span class="time-badge" style="background:rgba(255,255,255,0.07);color:var(--text-muted);">${h.customTime||''}</span>`
  };
  return map[h.timeSlot]||'';
}

function cardHTML(h, done) {
  const doneCount=getDoneCount(h), target=getTarget(h);
  const prog = target>1?`<span class="habit-prog${doneCount>=target?' full':''}">${doneCount}/${target}</span>`:'';
  return `<div class="habit-card${done?' done':''}">
    <div class="habit-emoji">${h.emoji}</div>
    <div class="habit-info">
      <div class="habit-name">${h.name}</div>
      <div class="habit-meta">${timeBadgeHTML(h)}${prog}</div>
    </div>
    <button class="check-btn${done?' checked':''}" onclick="toggleHabit('${h.id}')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>
    </button>
  </div>`;
}

function toggleHabit(id) {
  const h = habits.find(x=>x.id===id); if(!h) return;
  const t = today();
  if(!logs[t]) logs[t]={};
  const done=getDoneCount(h), target=getTarget(h);
  if (done>=target) {
    // uncheck: find most recent log day this week
    if ((logs[t][id]||0)>0) { logs[t][id]--; }
    else {
      const ws=getWeekStart(new Date());
      for(let i=6;i>=0;i--){const d=new Date(ws);d.setDate(d.getDate()+i);const k=dateKey(d);if(logs[k]&&(logs[k][id]||0)>0){logs[k][id]--;break;}}
    }
  } else {
    logs[t][id]=(logs[t][id]||0)+1;
    if(getDoneCount(h)>=target) showToast(`${h.emoji} ¡${h.name} completado!`);
  }
  save(); renderToday(); updateStreakBadge();
}

function openModal(mode, id) {
  if (mode==='notif') { renderNotifModal(); document.getElementById('modalNotif').classList.add('open'); return; }
  editingId=null; weeklyTimes=3; selectedEmoji='💪'; selectedFreq='daily'; selectedTime='anytime'; notifOn=false; selectedDays=[];
  document.getElementById('habitName').value='';
  document.getElementById('customTime').value='08:00';
  document.getElementById('notifTime').value='08:00';
  document.getElementById('notifToggle').classList.remove('on');
  document.getElementById('modalHabitDelete').style.display='none';
  document.getElementById('weeklyField').style.display='none';
  document.getElementById('daysField').style.display='none';
  document.getElementById('customTimeField').style.display='none';
  document.getElementById('notifTimeField').style.display='none';
  syncFreqPills(); syncTimePills();
  document.getElementById('selectedEmojiDisplay').textContent=selectedEmoji;
  document.getElementById('weeklyTimesDisplay').textContent=weeklyTimes;

  if (mode==='edit'&&id) {
    const h=habits.find(x=>x.id===id); if(!h) return;
    editingId=id; selectedEmoji=h.emoji; selectedFreq=h.freq; selectedTime=h.timeSlot;
    weeklyTimes=h.weeklyTimes||3; selectedDays=h.days?[...h.days]:[]; notifOn=h.notifOn||false;
    document.getElementById('habitName').value=h.name;
    document.getElementById('customTime').value=h.customTime||'08:00';
    document.getElementById('notifTime').value=h.notifTime||'08:00';
    document.getElementById('selectedEmojiDisplay').textContent=selectedEmoji;
    document.getElementById('weeklyTimesDisplay').textContent=weeklyTimes;
    if(notifOn) document.getElementById('notifToggle').classList.add('on');
    document.getElementById('modalHabitDelete').style.display='block';
    document.getElementById('modalHabitTitle').textContent='Editar hábito';
    syncFreqPills(); syncTimePills(); updateFreqUI(); updateTimeUI();
  } else {
    document.getElementById('modalHabitTitle').textContent='Nuevo hábito';
  }
  document.getElementById('modalHabit').classList.add('open');
}

function syncFreqPills() { document.querySelectorAll('[data-freq]').forEach(p=>p.classList.toggle('selected',p.dataset.freq===selectedFreq)); }
function syncTimePills() { document.querySelectorAll('[data-time]').forEach(p=>p.classList.toggle('selected',p.dataset.time===selectedTime)); }

function selectFreq(f) { selectedFreq=f; syncFreqPills(); updateFreqUI(); }
function updateFreqUI() {
  document.getElementById('weeklyField').style.display=selectedFreq==='weekly'?'block':'none';
  document.getElementById('daysField').style.display=selectedFreq==='days'?'block':'none';
  document.getElementById('weeklyTimesDisplay').textContent=weeklyTimes;
  if(selectedFreq==='days') buildDaysGrid();
}
function buildDaysGrid() {
  document.getElementById('daysGrid').innerHTML=DAYS_LABELS.map((d,i)=>
    `<button class="day-btn${selectedDays.includes(i)?' selected':''}" onclick="toggleDay(${i})">${d}</button>`
  ).join('');
}
function toggleDay(i) { const idx=selectedDays.indexOf(i); if(idx>=0)selectedDays.splice(idx,1);else selectedDays.push(i); buildDaysGrid(); }
function changeWeeklyTimes(d) { weeklyTimes=Math.max(1,Math.min(7,weeklyTimes+d)); document.getElementById('weeklyTimesDisplay').textContent=weeklyTimes; }

function selectTime(t) { selectedTime=t; syncTimePills(); updateTimeUI(); }
function updateTimeUI() { document.getElementById('customTimeField').style.display=selectedTime==='custom'?'block':'none'; }

function toggleNotif() {
  notifOn=!notifOn;
  document.getElementById('notifToggle').classList.toggle('on',notifOn);
  document.getElementById('notifTimeField').style.display=notifOn?'block':'none';
  if(notifOn&&'Notification'in window&&Notification.permission==='default') Notification.requestPermission();
}

function saveHabit() {
  const name=document.getElementById('habitName').value.trim();
  if(!name){showToast('Ponle un nombre al hábito');return;}
  const habit={
    id:editingId||`h_${Date.now()}`, name, emoji:selectedEmoji,
    freq:selectedFreq, weeklyTimes, days:[...selectedDays],
    timeSlot:selectedTime, customTime:document.getElementById('customTime').value,
    notifOn, notifTime:document.getElementById('notifTime').value,
    color:DOT_COLORS[habits.length%DOT_COLORS.length]
  };
  if(editingId){const idx=habits.findIndex(h=>h.id===editingId);habit.color=habits[idx].color;habits[idx]=habit;}
  else habits.push(habit);
  save(); closeModal('modalHabit');
  showToast(editingId?'✅ Hábito actualizado':'🎉 Hábito creado');
  renderToday(); renderHabitsList();
}

function deleteHabitEditing() {
  if(!editingId) return;
  habits=habits.filter(h=>h.id!==editingId); save();
  closeModal('modalHabit'); showToast('🗑️ Eliminado'); renderToday(); renderHabitsList();
}
function confirmDelete(id) {
  const h=habits.find(x=>x.id===id); if(!h) return;
  if(confirm(`¿Eliminar "${h.name}"?`)){habits=habits.filter(x=>x.id!==id);save();renderHabitsList();renderToday();showToast('🗑️ Eliminado');}
}

  document.getElementById('emojiGrid').innerHTML=(list||ALL_EMOJIS).map(e=>
    `<div class="emoji-opt" onclick="pickEmoji('${e}')">${e}</div>`
  ).join('');
}
function pickEmoji(e) {
  selectedEmoji=e;

// ─── STATS ───
function changeStatsMonth(d) {
  statsMonth=new Date(statsMonth.getFullYear(),statsMonth.getMonth()+d,1);
  const now=new Date();
  document.getElementById('statsNextBtn').style.opacity=(statsMonth.getFullYear()===now.getFullYear()&&statsMonth.getMonth()===now.getMonth())?'0.3':'1';
  renderStats();
}
function renderStats() {
  const months=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  const m=statsMonth;
  document.getElementById('statsMonthName').textContent=`${months[m.getMonth()]} ${m.getFullYear()}`;
  const visible=statsHabitFilter?habits.filter(h=>h.id===statsHabitFilter):habits;
  const days=new Date(m.getFullYear(),m.getMonth()+1,0).getDate();
  let total=0;
  for(let d=1;d<=days;d++){const dk=dateKey(new Date(m.getFullYear(),m.getMonth(),d));if(!logs[dk])continue;visible.forEach(h=>{if(logs[dk][h.id])total+=logs[dk][h.id];});}
  const streak=calcStreak();
  document.getElementById('statsSummary').innerHTML=`<div class="stat-box"><div class="stat-val">${total}</div><div class="stat-lbl">Completados este mes</div></div><div class="stat-box"><div class="stat-val">${streak}</div><div class="stat-lbl">Racha actual 🔥</div></div>`;
  document.getElementById('statsFilter').innerHTML=`<div class="filter-chip${statsHabitFilter===null?' active':''}" onclick="setStatsFilter(null)">Todos</div>`+
    habits.map(h=>`<div class="filter-chip${statsHabitFilter===h.id?' active':''}" onclick="setStatsFilter('${h.id}')">${h.emoji} ${h.name}</div>`).join('');
  renderCalendar(m,visible);
}
function setStatsFilter(id){statsHabitFilter=id;renderStats();}
function renderCalendar(m,visible){
  const cal=document.getElementById('statsCalendar');
  const firstDay=new Date(m.getFullYear(),m.getMonth(),1);
  const daysInM=new Date(m.getFullYear(),m.getMonth()+1,0).getDate();
  const startDow=jsDayToMon(firstDay); const todayStr=today();
  const dayHeaders=['L','M','X','J','V','S','D'];
  let html=dayHeaders.map(d=>`<div class="cal-day-header">${d}</div>`).join('');
  for(let i=0;i<startDow;i++) html+=`<div class="cal-day other-month"></div>`;
  for(let d=1;d<=daysInM;d++){
    const dk=dateKey(new Date(m.getFullYear(),m.getMonth(),d));
    const isToday=dk===todayStr; const dl=logs[dk]||{};
    const dots=visible.filter(h=>dl[h.id]>=1).map(h=>`<div class="dot" style="background:${h.color}"></div>`).join('');
    html+=`<div class="cal-day${isToday?' today':''}"><span>${d}</span>${dots?`<div class="cal-day-dots">${dots}</div>`:''}</div>`;
  }
  cal.innerHTML=html;
}
function calcStreak(){
  let streak=0,d=new Date();
  for(let i=0;i<365;i++){
    const dk=dateKey(d); const dl=logs[dk]||{};
    const due=habits.filter(h=>isDueOnDate(h,d));
    if(!due.length){d.setDate(d.getDate()-1);continue;}
    if(due.some(h=>(dl[h.id]||0)>=1)) streak++;
    else if(dk!==today()) break;
    d.setDate(d.getDate()-1);
  }
  return streak;
}
function isDueOnDate(h,date){
  const dow=jsDayToMon(date);
  if(h.freq==='daily') return true;
  if(h.freq==='days') return h.days.includes(dow);
  if(h.freq==='weekly') return true;
  return false;
}

// ─── NOTIF MODAL ───
function renderNotifModal(){
  const el=document.getElementById('notifList');
  const with_notif=habits.filter(h=>h.notifOn);
  el.innerHTML=with_notif.length?with_notif.map(h=>`<div class="habit-list-item"><div class="hi-emoji">${h.emoji}</div><div class="hi-info"><div class="hi-name">${h.name}</div><div class="hi-freq">🔔 ${h.notifTime}</div></div></div>`).join(''):`<p class="empty-msg" style="text-align:center;padding:20px 0;">Ningún hábito con notificaciones.<br>Edita un hábito para configurarlas.</p>`;
}

function closeModal(id){document.getElementById(id).classList.remove('open');}
function closeModalOutside(e,id){if(e.target===document.getElementById(id))closeModal(id);}
let toastTimer;
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove('show'),2500);}

function checkInstallBanner() {
  const isIOS=/iphone|ipad|ipod/.test(navigator.userAgent.toLowerCase());
  const isStandalone=window.matchMedia('(display-mode: standalone)').matches||window.navigator.standalone;
  if(isIOS&&!isStandalone&&!localStorage.getItem('installDismissed')) {
    document.getElementById('installBanner').classList.add('show');
  }
}

// ─── NOTIFICATION INTERVAL ───
setInterval(()=>{
  if(!('Notification'in window)||Notification.permission!=='granted') return;
  const now=new Date(), hhmm=`${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
  habits.forEach(h=>{
    if(!h.notifOn||h.notifTime!==hhmm||!isDueToday(h)||isComplete(h)) return;
    new Notification(`${h.emoji} ${h.name}`,{body:'Es hora de tu hábito',icon:''});
  });
},60000);
