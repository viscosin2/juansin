<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Huerto">
<meta name="theme-color" content="#f5f0e8">
<title>Huerto</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f5f0e8;
  --surface:#fffdf8;
  --surface2:#f0ebe0;
  --border:#ddd6c5;
  --text:#3a3228;
  --text-muted:#8a7d6b;
  --text-dim:#c4b8a4;
  --green1:#e8f5e0;
  --green2:#c5e0a8;
  --green3:#8abe5c;
  --green4:#5a9632;
  --green5:#3d6b20;
  --brown1:#f0e8d8;
  --brown2:#c8a878;
  --brown3:#8b6840;
  --accent:#5a9632;
  --water:#7ec8d8;
  --water-light:#e0f4f8;
  --radius:20px;
  --danger:#d45a4a;
  --morning:#f4c678;
  --afternoon:#e8916a;
  --night:#7a8dc8;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;overflow:hidden;background:var(--surface);}
body{
  font-family:'DM Sans',sans-serif;
  background:var(--bg);
  color:var(--text);
  user-select:none;
  position:fixed;
  inset:0;
}
.app{
  position:fixed;
  inset:0;
  display:flex;
  flex-direction:column;
  height:100svh;
  overflow:hidden;
  background:var(--bg);
}

/* TOP BAR */
.topbar{
  padding:calc(var(--safe-top) + 18px) 20px 14px;
  background:var(--bg);
  display:flex;
  align-items:center;
  justify-content:space-between;
  border-bottom:1px solid var(--border);
  position:sticky;
  top:0;
  z-index:10;
}
.topbar-title{
  font-family:'Lora',serif;
  font-size:24px;
  font-weight:600;
  color:var(--text);
  letter-spacing:-0.3px;
}
.topbar-title span{color:var(--green4);}
.streak-badge{
  font-size:13px;
  color:var(--text-muted);
  background:var(--green1);
  padding:4px 10px;
  border-radius:20px;
  font-weight:500;
}

/* SCROLL */
.scroll-area{
  flex:1;
  overflow-y:auto;
  padding:16px 18px calc(90px + env(safe-area-inset-bottom,0px));
  -webkit-overflow-scrolling:touch;
}
.scroll-area::-webkit-scrollbar{display:none;}
.screen{display:none;}.screen.active{display:block;}

/* GARDEN VISUALIZATION */
.garden-wrap{
  background:linear-gradient(180deg, #d4efc8 0%, #b8d99a 40%, #c8a878 70%, #b89060 100%);
  border-radius:var(--radius);
  padding:16px;
  margin-bottom:18px;
  position:relative;
  overflow:hidden;
  min-height:180px;
}
.garden-sky{
  position:absolute;
  top:0;left:0;right:0;
  height:50%;
  background:linear-gradient(180deg, #c8e8f8 0%, #d4efc8 100%);
  border-radius:var(--radius) var(--radius) 0 0;
}
.garden-ground{
  position:absolute;
  bottom:0;left:0;right:0;
  height:55%;
  background:linear-gradient(180deg, #c8a878 0%, #b08050 100%);
}
.garden-grass{
  position:absolute;
  bottom:48%;left:0;right:0;
  height:22px;
  background:linear-gradient(180deg, #8abe5c 0%, #5a9632 100%);
}
.garden-content{
  position:relative;
  z-index:2;
  display:flex;
  align-items:flex-end;
  justify-content:center;
  gap:10px;
  min-height:148px;
  padding-bottom:8px;
}
.garden-label{
  position:absolute;
  top:10px;left:16px;
  font-family:'Lora',serif;
  font-size:13px;
  font-style:italic;
  color:rgba(60,80,40,0.7);
  z-index:3;
}
.garden-pct{
  position:absolute;
  top:10px;right:16px;
  font-size:12px;
  font-weight:500;
  color:var(--green5);
  background:rgba(255,255,255,0.6);
  padding:3px 9px;
  border-radius:20px;
  z-index:3;
}

/* PLANTS */
.plant{
  display:flex;
  flex-direction:column;
  align-items:center;
  cursor:pointer;
  transition:transform 0.3s;
}
.plant:active{transform:scale(0.95);}
.plant-svg{transition:all 0.6s ease;}
.plant-label{
  font-size:9px;
  font-weight:500;
  color:var(--green5);
  background:rgba(255,255,255,0.7);
  padding:2px 6px;
  border-radius:10px;
  margin-top:2px;
  max-width:54px;
  text-align:center;
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
}

/* WATER ANIMATION */
@keyframes waterDrop{
  0%{opacity:1;transform:translateY(0) scale(1);}
  100%{opacity:0;transform:translateY(30px) scale(0.5);}
}
.water-drop{
  position:absolute;
  font-size:16px;
  pointer-events:none;
  animation:waterDrop 0.8s ease-out forwards;
  z-index:10;
}

/* NAV */
.nav{
  position:fixed;
  left:0;right:0;bottom:0;
  background:var(--surface);
  border-top:1.5px solid var(--border);
  display:flex;
  align-items:flex-start;
  padding:14px 8px env(safe-area-inset-bottom,0px);
  gap:4px;
  z-index:999;
}
.nav-btn{
  flex:1;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:4px;
  padding:8px 2px 6px;
  border:none;
  background:none;
  color:var(--text-muted);
  font-family:'DM Sans',sans-serif;
  font-size:10px;
  font-weight:500;
  cursor:pointer;
  border-radius:12px;
  -webkit-appearance:none;
}
.nav-btn.active{color:var(--green4);}
.nav-btn svg{width:20px;height:20px;}
.nav-add{
  width:52px;height:52px;
  border-radius:50%;
  background:var(--green4);
  border:none;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;flex-shrink:0;
  -webkit-appearance:none;
  box-shadow:0 4px 12px rgba(90,150,50,0.35);
  margin-top:-10px;
}
.nav-add svg{width:22px;height:22px;color:#fff;}

/* SECTION */
.section-label{
  font-size:11px;
  font-weight:500;
  letter-spacing:0.06em;
  text-transform:uppercase;
  color:var(--text-muted);
  margin:14px 0 10px;
  font-family:'DM Sans',sans-serif;
}
.empty-msg{
  color:var(--text-muted);
  font-size:14px;
  padding:20px 0;
  text-align:center;
  font-family:'Lora',serif;
  font-style:italic;
}

/* HABIT CARD */
.habit-card{
  background:var(--surface);
  border:1.5px solid var(--border);
  border-radius:var(--radius);
  padding:14px;
  margin-bottom:10px;
  display:flex;
  align-items:center;
  gap:12px;
  transition:opacity 0.3s, transform 0.2s;
}
.habit-card.done{opacity:0.55;}
.habit-card.done .habit-name{text-decoration:line-through;color:var(--text-muted);}
.habit-emoji{
  width:44px;height:44px;
  border-radius:14px;
  display:flex;align-items:center;justify-content:center;
  font-size:22px;flex-shrink:0;
  background:var(--green1);
}
.habit-info{flex:1;min-width:0;}
.habit-name{
  font-size:15px;font-weight:500;
  margin-bottom:4px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.habit-meta{display:flex;align-items:center;gap:6px;}
.time-badge{font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px;}
.badge-morning{background:rgba(244,198,120,0.2);color:#a06820;}
.badge-afternoon{background:rgba(232,145,106,0.2);color:#a04830;}
.badge-night{background:rgba(122,141,200,0.2);color:#4858a0;}
.habit-prog{font-size:11px;color:var(--text-muted);}
.habit-prog.full{color:var(--green4);font-weight:600;}

/* CHECK BUTTON */
.check-btn{
  width:38px;height:38px;
  border-radius:50%;
  border:2px solid var(--border);
  background:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;color:transparent;
  -webkit-appearance:none;
  transition:all 0.25s;
}
.check-btn.checked{
  background:var(--green4);
  border-color:var(--green4);
  color:#fff;
}
.check-btn svg{width:16px;height:16px;}

/* HABITS LIST */
.habit-list-item{
  background:var(--surface);
  border:1.5px solid var(--border);
  border-radius:var(--radius);
  padding:14px 16px;
  margin-bottom:10px;
  display:flex;align-items:center;gap:12px;
}
.hi-emoji{font-size:22px;width:36px;text-align:center;flex-shrink:0;}
.hi-info{flex:1;}
.hi-name{font-size:15px;font-weight:500;}
.hi-freq{font-size:12px;color:var(--text-muted);margin-top:3px;display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.hi-actions{display:flex;gap:8px;}
.icon-btn{
  width:34px;height:34px;
  border-radius:10px;
  border:1.5px solid var(--border);
  background:var(--surface2);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;color:var(--text-muted);
  -webkit-appearance:none;
}
.icon-btn.del{border-color:rgba(212,90,74,0.25);color:var(--danger);}
.icon-btn svg{width:14px;height:14px;}

/* MODAL */
.modal-overlay{
  position:fixed;inset:0;
  background:rgba(60,50,40,0.5);
  z-index:100;display:none;align-items:flex-end;
  backdrop-filter:blur(4px);
}
.modal-overlay.open{display:flex;}
.modal{
  background:var(--surface);
  border-radius:28px 28px 0 0;
  width:100%;
  max-height:92dvh;
  overflow-y:auto;
  padding:24px 22px calc(env(safe-area-inset-bottom,0px) + 28px);
}
.modal::-webkit-scrollbar{display:none;}
.modal-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 20px;}
.modal-title-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
.modal-title{font-family:'Lora',serif;font-size:22px;font-weight:600;color:var(--text);}
.modal-close{
  width:34px;height:34px;border-radius:50%;
  border:1.5px solid var(--border);
  background:var(--surface2);color:var(--text-muted);
  font-size:20px;line-height:1;cursor:pointer;
}
.field{margin-bottom:16px;}
.field label{
  display:block;font-size:11px;font-weight:500;
  letter-spacing:0.06em;text-transform:uppercase;
  color:var(--text-muted);margin-bottom:8px;
}
.input{
  width:100%;background:var(--surface2);
  border:1.5px solid var(--border);
  border-radius:14px;color:var(--text);
  font-family:'DM Sans',sans-serif;font-size:15px;
  padding:12px 14px;outline:none;-webkit-appearance:none;
}
.input:focus{border-color:var(--green3);}
.emoji-trigger{
  width:100%;background:var(--surface2);
  border:1.5px solid var(--border);
  border-radius:14px;padding:12px 14px;
  display:flex;align-items:center;gap:10px;cursor:pointer;
}
.emoji-trigger .big{font-size:26px;}
.emoji-trigger .hint{font-size:13px;color:var(--text-muted);}
.emoji-trigger.compact{height:56px;padding:0;justify-content:center;}
.emoji-trigger.compact .big{font-size:28px;}
.habit-main-row{display:grid;grid-template-columns:64px 1fr;gap:12px;align-items:center;margin-bottom:18px;}
.pill-group{display:flex;gap:6px;flex-wrap:wrap;}
.pill{
  padding:7px 14px;border-radius:20px;
  border:1.5px solid var(--border);
  background:var(--surface2);color:var(--text-muted);
  font-size:13px;font-weight:500;cursor:pointer;
  -webkit-appearance:none;
}
.pill.selected{background:var(--green4);border-color:var(--green4);color:#fff;}
.days-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;}
.day-btn{
  aspect-ratio:1;border-radius:10px;
  border:1.5px solid var(--border);
  background:var(--surface2);color:var(--text-muted);
  font-size:11px;font-weight:600;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  -webkit-appearance:none;
}
.day-btn.selected{background:var(--green4);border-color:var(--green4);color:#fff;}
.times-row{display:flex;align-items:center;gap:16px;}
.num-btn{
  width:40px;height:40px;border-radius:50%;
  border:1.5px solid var(--border);
  background:var(--surface2);color:var(--text);
  font-size:20px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  -webkit-appearance:none;
}
.num-btn:active{background:var(--green3);color:#fff;}
.num-display{font-size:26px;font-weight:700;min-width:40px;text-align:center;}
.toggle-row{display:flex;align-items:center;justify-content:space-between;padding:4px 0;}
.toggle{
  position:relative;width:46px;height:28px;
  background:var(--surface2);border-radius:14px;
  cursor:pointer;border:1.5px solid var(--border);flex-shrink:0;
}
.toggle.on{background:var(--green4);border-color:var(--green4);}
.toggle::after{
  content:'';position:absolute;width:22px;height:22px;
  background:white;border-radius:50%;top:2px;left:2px;
  transition:transform 0.2s;
}
.toggle.on::after{transform:translateX(18px);}
.btn-primary{
  width:100%;padding:15px;border-radius:16px;
  background:var(--green4);color:#fff;
  font-family:'DM Sans',sans-serif;font-size:15px;font-weight:500;
  border:none;cursor:pointer;margin-top:10px;
  -webkit-appearance:none;
  transition:background 0.2s;
}
.btn-primary:active{background:var(--green5);}
.btn-danger{
  width:100%;padding:15px;border-radius:16px;
  background:rgba(212,90,74,0.08);color:var(--danger);
  font-family:'DM Sans',sans-serif;font-size:15px;font-weight:500;
  border:1.5px solid rgba(212,90,74,0.2);cursor:pointer;margin-top:8px;
  -webkit-appearance:none;
}
.btn-secondary{
  width:100%;padding:15px;border-radius:16px;
  background:var(--surface2);color:var(--text-muted);
  font-family:'DM Sans',sans-serif;font-size:15px;font-weight:500;
  border:1.5px solid var(--border);cursor:pointer;margin-top:6px;
  -webkit-appearance:none;
}

/* EMOJI POPUP */
.emoji-popup{position:fixed;inset:0;background:rgba(60,50,40,0.5);z-index:200;display:none;align-items:flex-end;backdrop-filter:blur(4px);}
.emoji-popup.open{display:flex;}
.emoji-inner{
  background:var(--surface);border-radius:28px 28px 0 0;
  width:100%;height:70dvh;overflow:hidden;
  padding:20px 14px calc(env(safe-area-inset-bottom,0px)+24px);
  display:flex;flex-direction:column;
}
.emoji-search{
  width:100%;flex-shrink:0;
  background:var(--surface2);border:1.5px solid var(--border);
  border-radius:14px;color:var(--text);
  font-family:'DM Sans',sans-serif;font-size:15px;
  padding:12px 14px;outline:none;margin-bottom:12px;
  -webkit-appearance:none;
}
.emoji-grid{
  flex:1;overflow-y:auto;
  display:grid;grid-template-columns:repeat(8,1fr);
  gap:2px;padding-bottom:40px;
  -webkit-overflow-scrolling:touch;
}
.emoji-grid::-webkit-scrollbar{display:none;}
.emoji-opt{
  font-size:26px;padding:6px;
  background:none;border:none;cursor:pointer;
  border-radius:10px;
  -webkit-appearance:none;
}
.emoji-opt:active{background:var(--surface2);}

/* STATS */
.month-selector{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
.month-name{font-family:'Lora',serif;font-size:22px;font-weight:600;}
.month-nav{
  width:34px;height:34px;border-radius:10px;
  border:1.5px solid var(--border);
  background:var(--surface2);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;color:var(--text-muted);-webkit-appearance:none;
}
.month-nav svg{width:16px;height:16px;}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px;}
.stat-box{
  background:var(--surface);border:1.5px solid var(--border);
  border-radius:var(--radius);padding:16px;
}
.stat-val{font-size:34px;font-weight:600;color:var(--green4);font-family:'Lora',serif;}
.stat-lbl{font-size:11px;color:var(--text-muted);margin-top:4px;}
.filter-row{display:flex;gap:6px;overflow-x:auto;padding-bottom:8px;margin-bottom:16px;}
.filter-row::-webkit-scrollbar{display:none;}
.filter-chip{
  padding:6px 12px;border-radius:20px;white-space:nowrap;
  border:1.5px solid var(--border);
  background:var(--surface2);font-size:12px;font-weight:500;
  color:var(--text-muted);cursor:pointer;-webkit-appearance:none;
}
.filter-chip.active{background:var(--green4);border-color:var(--green4);color:#fff;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
.cal-header{font-size:10px;font-weight:500;color:var(--text-dim);text-align:center;padding:4px 0;}
.cal-day{
  aspect-ratio:1;border-radius:10px;
  background:var(--surface2);
  display:flex;align-items:center;justify-content:center;
  font-size:11px;color:var(--text-muted);
  flex-direction:column;gap:2px;
}
.cal-day.other{opacity:0.2;}
.cal-day.today{border:1.5px solid var(--green4);color:var(--green4);}
.cal-dots{display:flex;gap:2px;flex-wrap:wrap;justify-content:center;max-width:20px;}
.dot{width:5px;height:5px;border-radius:50%;}

/* TOAST */
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(12px);}to{opacity:1;transform:translateX(-50%) translateY(0);}}
.toast{
  position:fixed;
  bottom:calc(80px + env(safe-area-inset-bottom,0px));
  left:50%;transform:translateX(-50%) translateY(20px);
  background:var(--text);color:#fff;
  padding:10px 18px;border-radius:20px;
  font-size:13px;font-weight:500;white-space:nowrap;
  opacity:0;transition:all 0.3s;z-index:400;pointer-events:none;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* NOTIF MODAL */
#modalNotif .modal-title{text-align:center;margin-bottom:22px;}

/* INSTALL BANNER */
.install-banner{
  background:var(--green1);border:1.5px solid var(--green2);
  border-radius:var(--radius);padding:14px;margin-bottom:16px;
  display:none;align-items:center;gap:12px;
}
.install-banner.show{display:flex;}
.install-banner p{flex:1;font-size:13px;color:var(--green5);line-height:1.4;}
.install-banner button{
  padding:8px 14px;background:var(--green4);color:#fff;
  border:none;border-radius:10px;font-size:12px;font-weight:500;
  cursor:pointer;-webkit-appearance:none;
}

/* PLANT ANIMATIONS */
@keyframes grow{
  0%{transform:scaleY(0.7) scaleX(0.85);}
  60%{transform:scaleY(1.05) scaleX(0.98);}
  100%{transform:scaleY(1) scaleX(1);}
}
@keyframes sway{
  0%,100%{transform:rotate(-2deg);}
  50%{transform:rotate(2deg);}
}
@keyframes bounce{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-4px);}
}
.plant-svg.watered{animation:bounce 0.6s ease 3;}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="topbar-title">mi <span>huerto</span> 🌱</div>
    <div class="streak-badge" id="streakBadge"></div>
  </div>

  <!-- HOY -->
  <div class="scroll-area screen active" id="screenToday">
    <div class="install-banner" id="installBanner">
      <span style="font-size:20px">📲</span>
      <p><strong>Instalar app</strong><br>Compartir → "Añadir a pantalla de inicio"</p>
      <button onclick="dismissInstall()">OK</button>
    </div>

    <!-- GARDEN -->
    <div class="garden-wrap" id="gardenWrap">
      <div class="garden-sky"></div>
      <div class="garden-grass"></div>
      <div class="garden-ground"></div>
      <div class="garden-label" id="gardenLabel">tu huertito</div>
      <div class="garden-pct" id="gardenPct">0%</div>
      <div class="garden-content" id="gardenContent"></div>
    </div>

    <div class="section-label">pendientes</div>
    <div id="listPending"></div>
    <div id="doneSection" style="display:none">
      <div class="section-label" style="margin-top:16px">completados 🌿</div>
      <div id="listDone"></div>
    </div>
  </div>

  <!-- MIS HÁBITOS -->
  <div class="scroll-area screen" id="screenHabits">
    <div class="section-label">mis hábitos</div>
    <div id="habitsList"></div>
  </div>

  <!-- ESTADÍSTICAS -->
  <div class="scroll-area screen" id="screenStats">
    <div class="month-selector">

<script>
const EMOJIS=['🌱','🌿','🍀','🌾','🌵','🌲','🌳','🌴','🍃','🌺','🌸','🌼','🌻','🌹','💐','🍎','🍊','🍋','🍇','🍓','🥕','🥦','🌽','🧄','🧅','🥑','🍅','🫑','🥒','🌶','🍄','🌰','🥜','😀','😃','😄','😁','😆','😅','🤣','😂','🙂','😉','😊','😇','🥰','😍','🤩','😘','😎','🤓','💪','🧘','🏃','🏋️','🚴','🤸','🏊','🧗','🥊','🥋','🎯','🎨','🎭','🎬','🎤','🎧','🎼','🎹','🎸','🎺','🎻','📚','📖','✏️','🖊️','📝','💡','🔬','🔭','🧪','🧬','🏆','🥇','🥈','🥉','🏅','⭐','✨','🌟','💫','🔥','💧','🌊','❄️','🌈','☀️','🌙','⚡','🍵','☕','🥤','🧃','🍎','🥗','🍱','🧘‍♀️','🧘‍♂️','🐶','🐱','🐰','🦊','🐻','🐼','🦁','🐸','🦋','🐝','🌍','🌏','🗺','🏔','⛰','🏕','🏖','🏡','💤','😴','🛌','🧹','🪥','🪴','💊','🩺','❤️','🧡','💛','💚','💙','💜','🤍','✅','🌀'];
const DAYS=['L','M','X','J','V','S','D'];
const COLORS=['#5a9632','#8abe5c','#b08050','#7a8dc8','#d45a4a','#f4c678','#7ec8d8','#c87a9a'];

// Plant SVGs por nivel de crecimiento (0-4)
function plantSVG(stage, color, size=60){
  const s = size;
  const c = color || '#5a9632';
  const plants = [
    // Semilla / brote diminuto
    `<svg width="${s}" height="${s}" viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg">
      <ellipse cx="30" cy="50" rx="8" ry="4" fill="${c}22"/>
      <line x1="30" y1="50" x2="30" y2="38" stroke="${c}" stroke-width="2" stroke-linecap="round"/>
      <ellipse cx="30" cy="36" rx="5" ry="4" fill="${c}88" transform="rotate(-10 30 36)"/>
    </svg>`,
    // Plantita pequeña
    `<svg width="${s}" height="${s}" viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg">
      <ellipse cx="30" cy="52" rx="9" ry="4" fill="${c}22"/>
      <line x1="30" y1="52" x2="30" y2="32" stroke="${c}" stroke-width="2.5" stroke-linecap="round"/>
      <ellipse cx="22" cy="40" rx="8" ry="5" fill="${c}bb" transform="rotate(-30 22 40)"/>
      <ellipse cx="38" cy="37" rx="8" ry="5" fill="${c}bb" transform="rotate(30 38 37)"/>
      <ellipse cx="30" cy="30" rx="6" ry="4" fill="${c}" transform="rotate(-5 30 30)"/>
    </svg>`,
    // Planta mediana
    `<svg width="${s}" height="${s}" viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg">
      <ellipse cx="30" cy="54" rx="10" ry="4" fill="${c}22"/>
      <line x1="30" y1="54" x2="30" y2="28" stroke="${c}" stroke-width="3" stroke-linecap="round"/>
      <line x1="30" y1="46" x2="18" y2="38" stroke="${c}" stroke-width="2" stroke-linecap="round"/>
      <line x1="30" y1="40" x2="42" y2="32" stroke="${c}" stroke-width="2" stroke-linecap="round"/>
      <ellipse cx="14" cy="34" rx="9" ry="6" fill="${c}cc" transform="rotate(-20 14 34)"/>
      <ellipse cx="44" cy="28" rx="9" ry="6" fill="${c}cc" transform="rotate(20 44 28)"/>
      <ellipse cx="30" cy="22" rx="10" ry="7" fill="${c}" transform="rotate(-5 30 22)"/>
    </svg>`,
    // Planta grande con flor
    `<svg width="${s}" height="${s}" viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg">
      <ellipse cx="30" cy="55" rx="11" ry="4" fill="${c}22"/>
      <line x1="30" y1="55" x2="30" y2="22" stroke="${c}" stroke-width="3" stroke-linecap="round"/>
      <line x1="30" y1="48" x2="15" y2="38" stroke="${c}" stroke-width="2" stroke-linecap="round"/>
      <line x1="30" y1="38" x2="45" y2="28" stroke="${c}" stroke-width="2" stroke-linecap="round"/>
      <ellipse cx="11" cy="34" rx="9" ry="6" fill="${c}cc" transform="rotate(-25 11 34)"/>
      <ellipse cx="48" cy="24" rx="9" ry="6" fill="${c}cc" transform="rotate(25 48 24)"/>
      <ellipse cx="30" cy="16" rx="11" ry="8" fill="${c}"/>
      <circle cx="30" cy="14" r="5" fill="#f4c678"/>
      <circle cx="30" cy="14" r="3" fill="#e8916a"/>
    </svg>`,
    // Árbol frutal feliz
    `<svg width="${s}" height="${s}" viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg">
      <ellipse cx="30" cy="56" rx="12" ry="4" fill="${c}22"/>
      <rect x="27" y="36" width="6" height="20" rx="3" fill="${COLORS[2]}"/>
      <ellipse cx="30" cy="30" rx="18" ry="16" fill="${c}dd"/>
      <ellipse cx="18" cy="28" rx="10" ry="9" fill="${c}"/>
      <ellipse cx="42" cy="28" rx="10" ry="9" fill="${c}"/>
      <ellipse cx="30" cy="20" rx="12" ry="10" fill="${c}"/>
      <circle cx="22" cy="26" r="4" fill="#d45a4a88"/>
      <circle cx="36" cy="24" r="4" fill="#d45a4a88"/>
      <circle cx="28" cy="34" r="3.5" fill="#d45a4a88"/>
      <circle cx="22" cy="26" r="2.5" fill="#d45a4a"/>
      <circle cx="36" cy="24" r="2.5" fill="#d45a4a"/>
      <circle cx="28" cy="34" r="2" fill="#d45a4a"/>
    </svg>`
  ];
  return plants[Math.min(stage, 4)];
}

let habits=[],logs={};
let eId=null,wt=3,emoji='🌿',freq='daily',slot='anytime',notifOn=false,days=[];
let statsMon=new Date(new Date().getFullYear(),new Date().getMonth(),1),statsFilt=null;

const load=()=>{habits=JSON.parse(localStorage.getItem('hv5')||'[]');logs=JSON.parse(localStorage.getItem('lv5')||'{}');};
const save=()=>{localStorage.setItem('hv5',JSON.stringify(habits));localStorage.setItem('lv5',JSON.stringify(logs));};
const today=()=>dk(new Date());
const dk=(d)=>`${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}`;
const p=(n)=>String(n).padStart(2,'0');
const dow=(d)=>(d.getDay()+6)%7;
const weekStart=(date)=>{const d=new Date(date);const dy=d.getDay();d.setDate(d.getDate()-dy+(dy===0?-6:1));d.setHours(0,0,0,0);return d;};
const weekCount=(id)=>{const ws=weekStart(new Date());let n=0;for(let i=0;i<7;i++){const d=new Date(ws);d.setDate(d.getDate()+i);const k=dk(d);if(logs[k]&&logs[k][id])n+=logs[k][id];}return n;};
const todayCount=(id)=>{const t=today();return(logs[t]&&logs[t][id])||0;};
const doneCount=(h)=>h.freq==='weekly'?weekCount(h.id):todayCount(h.id);
const target=(h)=>h.freq==='weekly'?h.weeklyTimes:1;
const complete=(h)=>doneCount(h)>=target(h);
const dueToday=(h)=>{
  if(h.freq==='daily')return true;
  if(h.freq==='days')return h.days.includes(dow(new Date()));
  if(h.freq==='weekly')return doneCount(h)<h.weeklyTimes;
  return true;
};

// Calcula el % del día completado
function todayPct(){
  const due=habits.filter(h=>dueToday(h));
  if(!due.length)return 0;
  const done=due.filter(h=>complete(h)).length;
  return Math.round((done/due.length)*100);
}

// Plant stage según progreso histórico del hábito
function habitStage(h){
  const streak=habitStreak(h);
  if(streak>=30)return 4;
  if(streak>=14)return 3;
  if(streak>=7)return 2;
  if(streak>=2)return 1;
  return 0;
}
function habitStreak(h){
  let s=0,d=new Date();
  for(let i=0;i<365;i++){
    const k=dk(d);
    const due=dueOnDate(h,d);
    if(due&&logs[k]&&(logs[k][h.id]||0)>=1)s++;
    else if(k!==today()&&due)break;
    d.setDate(d.getDate()-1);
  }
  return s;
}

// GARDEN
function renderGarden(){
  const pct=todayPct();
  document.getElementById('gardenPct').textContent=pct+'%';
  const labels=['tu huertito 🌱','creciendo 🌿','¡floreciendo! 🌸','¡qué huerto más bonito! 🌻','¡huerto de ensueño! 🌳'];
  const idx=pct===100?4:pct>75?3:pct>50?2:pct>25?1:0;
  document.getElementById('gardenLabel').textContent=labels[idx];

  const content=document.getElementById('gardenContent');
  if(!habits.length){
    content.innerHTML=`<div style="text-align:center;padding:20px 0;color:rgba(60,80,40,0.5);font-family:'Lora',serif;font-style:italic;font-size:13px;z-index:2;position:relative;">añade tu primer hábito<br>para plantar una semilla 🌱</div>`;
    return;
  }
  const due=habits.filter(h=>dueToday(h));
  const show=due.length?due:habits.slice(0,6);
  content.innerHTML=show.map(h=>{
    const stage=complete(h)?habitStage(h)+1:habitStage(h);
    const clamped=Math.min(stage,4);
    const size=44+clamped*8;
    return`<div class="plant" onclick="toggle('${h.id}')" title="${h.name}">
      <div class="plant-svg" id="psv_${h.id}">${plantSVG(clamped,h.color,size)}</div>
      <div class="plant-label">${h.emoji} ${h.name}</div>
    </div>`;
  }).join('');
}

// WATER DROP ANIMATION
function showWaterDrops(plantEl){
  for(let i=0;i<3;i++){
    setTimeout(()=>{
      const drop=document.createElement('div');
      drop.className='water-drop';
      drop.textContent='💧';
      const rect=plantEl.getBoundingClientRect();
      drop.style.left=(rect.left+rect.width/2-10+Math.random()*20-10)+'px';
      drop.style.top=(rect.top-10)+'px';
      document.body.appendChild(drop);
      setTimeout(()=>drop.remove(),900);
    },i*150);
  }
}

// SCREENS
function showScreen(name){
  closeAllModals();
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  const ids={today:'screenToday',habits:'screenHabits',stats:'screenStats'};
  const navs={today:'navToday',habits:'navHabits',stats:'navStats'};
  if(ids[name]){document.getElementById(ids[name]).classList.add('active');document.getElementById(navs[name]).classList.add('active');}
  if(name==='today'){renderToday();renderGarden();}
  else if(name==='habits')renderHabits();
  else renderStats();
}
function closeAllModals(){
  document.getElementById('modalHabit').classList.remove('open');
  document.getElementById('modalNotif').classList.remove('open');
  document.getElementById('emojiPopup').classList.remove('open');
}

// TODAY
const TORD={morning:1,afternoon:2,night:3,custom:4,anytime:5};
function renderToday(){
  const all=habits.filter(h=>dueToday(h)).sort((a,b)=>(TORD[a.slot]||5)-(TORD[b.slot]||5));
  const pend=all.filter(h=>!complete(h));
  const done=all.filter(h=>complete(h));
  const pEl=document.getElementById('listPending');
  const dEl=document.getElementById('listDone');
  const dSec=document.getElementById('doneSection');
  pEl.innerHTML=pend.length?pend.map(h=>cardHTML(h,false)).join(''):`<p class="empty-msg">el huerto está completo hoy 🌻</p>`;
  if(done.length){dSec.style.display='block';dEl.innerHTML=done.map(h=>cardHTML(h,true)).join('');}
  else dSec.style.display='none';
}

function badgeHTML(h){
  if(h.slot==='morning')return'<span class="time-badge badge-morning">Mañana</span>';
  if(h.slot==='afternoon')return'<span class="time-badge badge-afternoon">Tarde</span>';
  if(h.slot==='night')return'<span class="time-badge badge-night">Noche</span>';
  if(h.slot==='custom')return`<span class="time-badge" style="background:var(--brown1);color:var(--brown3)">${h.customTime||''}</span>`;
  return'';
}

function cardHTML(h,done){
  const dc=doneCount(h),tg=target(h);
  const prog=tg>1?`<span class="habit-prog${dc>=tg?' full':''}">${dc}/${tg}</span>`:'';
  const streak=habitStreak(h);
  const streakBadge=streak>1?`<span style="font-size:10px;color:var(--green4)">🔥${streak}</span>`:'';
  return`<div class="habit-card${done?' done':''}">
    <div class="habit-emoji" style="background:${h.color}22">${h.emoji}</div>
    <div class="habit-info">
      <div class="habit-name">${h.name}</div>
      <div class="habit-meta">${badgeHTML(h)}${prog}${streakBadge}</div>
    </div>
    <button class="check-btn${done?' checked':''}" onclick="toggle('${h.id}')" style="${done?'background:'+h.color+';border-color:'+h.color:''}">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>
    </button>
  </div>`;
}

function toggle(id){
  const h=habits.find(x=>x.id===id);if(!h)return;
  const t=today();if(!logs[t])logs[t]={};
  const dc=doneCount(h),tg=target(h);
  const wasDone=dc>=tg;
  if(wasDone){
    if((logs[t][id]||0)>0)logs[t][id]--;
    else{const ws=weekStart(new Date());for(let i=6;i>=0;i--){const d=new Date(ws);d.setDate(d.getDate()+i);const k=dk(d);if(logs[k]&&(logs[k][id]||0)>0){logs[k][id]--;break;}}}
  }else{
    logs[t][id]=(logs[t][id]||0)+1;
    if(doneCount(h)>=tg){
      // Water animation
      const plantEl=document.getElementById('psv_'+id);
      if(plantEl)showWaterDrops(plantEl);
      toast(`${h.emoji} ¡${h.name} regado! 💧`);
    }
  }
  save();renderToday();renderGarden();updateStreak();
}

// HABITS LIST

        </button>

const freqText=(h)=>h.freq==='daily'?'Diario':h.freq==='weekly'?`${h.weeklyTimes}×/sem`:h.days.map(d=>DAYS[d]).join(', ');

// MODAL HÁBITO
function openHabitModal(id){
  eId=null;wt=3;emoji='🌿';freq='daily';slot='anytime';notifOn=false;days=[];
  document.getElementById('habitName').value='';
  document.getElementById('customTime').value='08:00';
  document.getElementById('notifTime').value='08:00';
  document.getElementById('notifToggle').classList.remove('on');
  document.getElementById('btnDelete').style.display='none';
  document.getElementById('fWeekly').style.display='none';
  document.getElementById('fDays').style.display='none';
  document.getElementById('fCustomTime').style.display='none';
  document.getElementById('fNotifTime').style.display='none';
  if(id){
    const h=habits.find(x=>x.id===id);if(!h)return;
    eId=id;emoji=h.emoji;freq=h.freq;slot=h.slot||'anytime';wt=h.weeklyTimes||3;days=h.days?[...h.days]:[];notifOn=h.notifOn||false;
    document.getElementById('habitName').value=h.name;
    document.getElementById('customTime').value=h.customTime||'08:00';
    document.getElementById('notifTime').value=h.notifTime||'08:00';
    if(notifOn){document.getElementById('notifToggle').classList.add('on');document.getElementById('fNotifTime').style.display='block';}
    document.getElementById('btnDelete').style.display='block';
    document.getElementById('modalTitle').textContent='editar hábito';
  }else{
    document.getElementById('modalTitle').textContent='nuevo hábito';
  }
  document.getElementById('emojiDisplay').textContent=emoji;
  document.getElementById('wtDisplay').textContent=wt;
  syncFreq();syncSlot();updateFreqUI();updateSlotUI();
  document.getElementById('modalHabit').classList.add('open');
}
function syncFreq(){const pills=document.querySelectorAll('#freqPills .pill');['daily','weekly','days'].forEach((f,i)=>pills[i].classList.toggle('selected',f===freq));}
function syncSlot(){const pills=document.querySelectorAll('#timePills .pill');['anytime','morning','afternoon','night','custom'].forEach((s,i)=>pills[i].classList.toggle('selected',s===slot));}
function setFreq(f){freq=f;syncFreq();updateFreqUI();}
function updateFreqUI(){
  document.getElementById('fWeekly').style.display=freq==='weekly'?'block':'none';
  document.getElementById('fDays').style.display=freq==='days'?'block':'none';
  document.getElementById('wtDisplay').textContent=wt;
  if(freq==='days')buildDays();
}
function buildDays(){document.getElementById('daysGrid').innerHTML=DAYS.map((d,i)=>`<button class="day-btn${days.includes(i)?' selected':''}" onclick="toggleDay(${i})">${d}</button>`).join('');}
function toggleDay(i){const idx=days.indexOf(i);if(idx>=0)days.splice(idx,1);else days.push(i);buildDays();}
function changeWT(d){wt=Math.max(1,Math.min(7,wt+d));document.getElementById('wtDisplay').textContent=wt;}
function setSlot(s){slot=s;syncSlot();updateSlotUI();}
function updateSlotUI(){document.getElementById('fCustomTime').style.display=slot==='custom'?'block':'none';}
function toggleNotif(){
  notifOn=!notifOn;
  document.getElementById('notifToggle').classList.toggle('on',notifOn);
  document.getElementById('fNotifTime').style.display=notifOn?'block':'none';
  if(notifOn&&'Notification'in window&&Notification.permission==='default')Notification.requestPermission();
}
function saveHabit(){
  const name=document.getElementById('habitName').value.trim();
  if(!name){toast('Ponle un nombre al hábito 🌱');return;}
  const h={
    id:eId||`h${Date.now()}`,name,emoji,freq,
    weeklyTimes:wt,days:[...days],slot,
    customTime:document.getElementById('customTime').value,
    notifOn,notifTime:document.getElementById('notifTime').value,
    color:COLORS[habits.length%COLORS.length]
  };
  if(eId){const i=habits.findIndex(x=>x.id===eId);h.color=habits[i].color;habits[i]=h;}
  else habits.push(h);
  save();closeModal('modalHabit');
  toast(eId?'✅ Actualizado':'🌱 ¡Nueva semilla plantada!');
  renderToday();renderGarden();renderHabits();
}
function deleteEditing(){if(!eId)return;habits=habits.filter(h=>h.id!==eId);save();closeModal('modalHabit');toast('🍂 Eliminado');renderToday();renderGarden();renderHabits();}
function delHabit(id){const h=habits.find(x=>x.id===id);if(!h)return;if(confirm(`¿Eliminar "${h.name}"?`)){habits=habits.filter(x=>x.id!==id);save();renderHabits();renderToday();renderGarden();toast('🍂 Eliminado');}}

// EMOJI
function openEmojiPopup(){document.getElementById('emojiSearch').value='';buildEmojiGrid(EMOJIS);document.getElementById('emojiPopup').classList.add('open');}
function filterEmoji(q){buildEmojiGrid(q?EMOJIS.filter(e=>e.includes(q)):EMOJIS);}
function buildEmojiGrid(list){document.getElementById('emojiGrid').innerHTML=list.map(e=>`<button class="emoji-opt" onclick="pickEmoji('${e}')">${e}</button>`).join('');}
function pickEmoji(e){emoji=e;document.getElementById('emojiDisplay').textContent=e;document.getElementById('emojiPopup').classList.remove('open');}

// NOTIFS
function openNotifModal(){
  const wn=habits.filter(h=>h.notifOn);
  document.getElementById('notifList').innerHTML=wn.length
    ?wn.map(h=>`<div class="habit-list-item"><div class="hi-emoji">${h.emoji}</div><div class="hi-info"><div class="hi-name">${h.name}</div><div class="hi-freq">🔔 ${h.notifTime}</div></div></div>`).join('')
    :'<p class="empty-msg" style="text-align:center;padding:20px 0">Ningún hábito con notificaciones.</p>';
  document.getElementById('modalNotif').classList.add('open');
}

// STATS
function changeMonth(d){statsMon=new Date(statsMon.getFullYear(),statsMon.getMonth()+d,1);const now=new Date();document.getElementById('btnNextMonth').style.opacity=(statsMon.getFullYear()===now.getFullYear()&&statsMon.getMonth()===now.getMonth())?'0.3':'1';renderStats();}
function renderStats(){
  const M=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  document.getElementById('statsMonthName').textContent=`${M[statsMon.getMonth()]} ${statsMon.getFullYear()}`;
  const vis=statsFilt?habits.filter(h=>h.id===statsFilt):habits;
  const dim=new Date(statsMon.getFullYear(),statsMon.getMonth()+1,0).getDate();
  let tot=0;
  for(let d=1;d<=dim;d++){const k=dk(new Date(statsMon.getFullYear(),statsMon.getMonth(),d));if(!logs[k])continue;vis.forEach(h=>{if(logs[k][h.id])tot+=logs[k][h.id];});}
  document.getElementById('statsGrid').innerHTML=`
    <div class="stat-box"><div class="stat-val">${tot}</div><div class="stat-lbl">Riegos este mes 💧</div></div>
    <div class="stat-box"><div class="stat-val">${calcStreak()}</div><div class="stat-lbl">Racha actual 🔥</div></div>`;
  document.getElementById('statsFilter').innerHTML=`<div class="filter-chip${statsFilt===null?' active':''}" onclick="setFilt(null)">Todos</div>`+habits.map(h=>`<div class="filter-chip${statsFilt===h.id?' active':''}" onclick="setFilt('${h.id}')">${h.emoji} ${h.name}</div>`).join('');
  renderCal(vis);
}
function setFilt(id){statsFilt=id;renderStats();}
function renderCal(vis){
  const fd=new Date(statsMon.getFullYear(),statsMon.getMonth(),1);
  const dim=new Date(statsMon.getFullYear(),statsMon.getMonth()+1,0).getDate();
  const sd=dow(fd);const todayStr=today();
  let h=DAYS.map(d=>`<div class="cal-header">${d}</div>`).join('');
  for(let i=0;i<sd;i++)h+=`<div class="cal-day other"></div>`;
  for(let d=1;d<=dim;d++){
    const k=dk(new Date(statsMon.getFullYear(),statsMon.getMonth(),d));
    const isT=k===todayStr;const dl=logs[k]||{};
    const dots=vis.filter(x=>dl[x.id]>=1).map(x=>`<div class="dot" style="background:${x.color}"></div>`).join('');
    h+=`<div class="cal-day${isT?' today':''}"><span>${d}</span>${dots?`<div class="cal-dots">${dots}</div>`:''}</div>`;
  }
  document.getElementById('statsCal').innerHTML=h;
}
function calcStreak(){
  let s=0,d=new Date();
  for(let i=0;i<365;i++){
    const k=dk(d);const dl=logs[k]||{};
    const due=habits.filter(h=>dueOnDate(h,d));
    if(due.length&&due.some(h=>(dl[h.id]||0)>=1))s++;
    else if(k!==today())break;
    d.setDate(d.getDate()-1);
  }
  return s;
}
function dueOnDate(h,date){
  const d=dow(date);
  return h.freq==='daily'||h.freq==='weekly'||(h.freq==='days'&&h.days.includes(d));
}

// UTILS
function closeModal(id){document.getElementById(id).classList.remove('open');}
let toastT;
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('show'),2500);}
function updateStreak(){const s=calcStreak();document.getElementById('streakBadge').textContent=s>0?`🔥 ${s} días`:'';}
function dismissInstall(){document.getElementById('installBanner').classList.remove('show');localStorage.setItem('installDismissed2','1');}
function checkInstall(){
  const iOS=/iphone|ipad|ipod/.test(navigator.userAgent.toLowerCase());
  const standalone=window.matchMedia('(display-mode: standalone)').matches||window.navigator.standalone;
  if(iOS&&!standalone&&!localStorage.getItem('installDismissed2'))document.getElementById('installBanner').classList.add('show');
}

// Cerrar modales tocando fuera
document.getElementById('modalHabit').addEventListener('click',function(e){if(e.target===this)closeModal('modalHabit');});
document.getElementById('modalNotif').addEventListener('click',function(e){if(e.target===this)closeModal('modalNotif');});
document.getElementById('emojiPopup').addEventListener('click',function(e){if(e.target===this)this.classList.remove('open');});

// Notif interval
setInterval(()=>{
  if(!('Notification'in window)||Notification.permission!=='granted')return;
  const now=new Date(),hm=`${p(now.getHours())}:${p(now.getMinutes())}`;
  habits.forEach(h=>{if(h.notifOn&&h.notifTime===hm&&dueToday(h)&&!complete(h))new Notification(`${h.emoji} ${h.name}`,{body:'¡Es hora de regar tu planta! 💧'});});
},60000);

load();checkInstall();updateStreak();showScreen('today');
</script>
